name: Deploy Google Apps Script

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Check out the latest code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Install Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. Install clasp globally
      - name: Install Google Clasp
        run: npm install -g @google/clasp

      # 4. Inject Google Credentials
      - name: Inject Clasp Auth Token
        run: |
          echo '${{ secrets.CLASPRC_JSON }}' > ~/.clasprc.json

      # 5. Push code to Central Library Project
      - name: Push to Central Library
        run: |
          echo '{"scriptId":"1LtcRLJCSl_JyL0zsfc-aizJT6CiWqFWAocc3CItBXRmixxM-eoqAnTv5","rootDir":"./src"}' > .clasp.json
          clasp push --force

      # 6. Push code to Full Codebase Master Sheet Template
      - name: Push to Full Codebase Master Sheet
        run: |
          echo '{"scriptId":"10DMZUV7wZqjj6SyQgrkhQ_PWnObRshN5rbUPp7nLDliG0fzpyYUfWerR","rootDir":"./src"}' > .clasp.json
          clasp push --force

      # 7. Push code to Target Project (Akhil Gupta)
      - name: Push to Akhil Gupta Project
        run: |
          echo '{"scriptId":"1qIkiqiLVYH-3vrJlglwYn1Xn-JhAZUAnjHxn727bKE7Zeha5o6kePvem","rootDir":"./src"}' > .clasp.json
          clasp push --force
