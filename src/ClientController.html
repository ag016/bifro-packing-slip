<script>
/**
 * Packing Slip Software - Client Controller
 * Client management event handlers and rendering
 */

let editingClientId = null;

function loadClients(callback) {
  google.script.run
    .withSuccessHandler(list => {
      clients = list || [];
      renderClients();
      populateClientSelect();
      populateFilterClient();
      if (typeof populateOrderFilterClient === 'function') {
        populateOrderFilterClient();
      }
      if (typeof callback === 'function') callback();
    })
    .withFailureHandler(handleError)
    .getClients();
}

function renderClients() {
  const tbody = $('#clients-table tbody');
  if (!tbody) return;
  tbody.innerHTML = '';
  
  if (!clients.length) {
    tbody.innerHTML = '<tr><td colspan="6" class="empty">No clients found. Add a client above to start.</td></tr>';
    return;
  }
  
  // Display clients starting with the most recent
  clients.slice().reverse().forEach(c => {
    const tr = document.createElement('tr');
    tr.className = 'table-row-animate';
    tr.innerHTML = `
      <td><span class="badge badge-accent">${escapeHtml(c.id || '')}</span></td>
      <td><strong>${escapeHtml(c.name || '')}</strong></td>
      <td>${escapeHtml(c.company || '—')}</td>
      <td>${escapeHtml(c.phone || '—')}</td>
      <td><span class="text-truncate" title="${escapeHtml(c.address || '')}">${escapeHtml(c.address || '—')}</span></td>
      <td>
        <button class="btn btn-secondary-soft btn-xs" onclick="editClient('${c.id}')" title="Edit Client" style="padding: 0.25rem 0.5rem; font-size: 0.75rem; display: inline-flex; align-items: center; gap: 4px;">
          <i data-lucide="edit-2" style="width: 12px; height: 12px;"></i> Edit
        </button>
      </td>
    `;
    tbody.appendChild(tr);
  });
  
  if (window.lucide) lucide.createIcons();
}

function editClient(clientId) {
  const c = clients.find(x => x.id === clientId);
  if (!c) return;
  
  editingClientId = c.id;
  
  // Populate form fields
  $('#client-name').value = c.name || '';
  $('#client-company').value = c.company || '';
  $('#client-phone').value = c.phone || '';
  $('#client-address').value = c.address || '';
  
  // Show cancel button
  const cancelBtn = $('#btn-cancel-client-edit');
  if (cancelBtn) cancelBtn.style.display = 'inline-flex';
  
  // Update card header and submit button
  const formCard = $('#clients .card:first-child');
  if (formCard) {
    const title = formCard.querySelector('h2');
    if (title) title.innerHTML = `<i data-lucide="edit" style="color:var(--accent);"></i> Edit Client Details: ${c.id}`;
    
    const submitBtn = $('#btn-save-client');
    if (submitBtn) submitBtn.innerHTML = '<i data-lucide="check-circle"></i> Update Client Details';
  }
  
  // Scroll to form
  $('#client-form').scrollIntoView({ behavior: 'smooth' });
  if (window.lucide) lucide.createIcons();
}

function cancelClientEdit() {
  editingClientId = null;
  $('#client-form').reset();
  
  // Hide cancel button
  const cancelBtn = $('#btn-cancel-client-edit');
  if (cancelBtn) cancelBtn.style.display = 'none';
  
  // Restore form header and button text
  const formCard = $('#clients .card:first-child');
  if (formCard) {
    const title = formCard.querySelector('h2');
    if (title) title.innerHTML = '<i data-lucide="user-plus" style="color:var(--accent);"></i> Register New Client';
    
    const submitBtn = $('#btn-save-client');
    if (submitBtn) submitBtn.innerHTML = '<i data-lucide="plus-circle"></i> Save Client Details';
  }
  
  if (window.lucide) lucide.createIcons();
}

function saveClient() {
  const clientName = $('#client-name').value.trim();
  const clientCompany = $('#client-company').value.trim();
  const clientPhone = $('#client-phone').value.trim();
  const clientAddress = $('#client-address').value.trim();
  
  if (!clientName) {
    toast('Client Name is required.', 'danger');
    return;
  }
  
  const client = {
    id: editingClientId || '',
    name: clientName,
    company: clientCompany,
    phone: clientPhone,
    address: clientAddress
  };
  
  // Disable button to prevent double submit
  const btn = $('#btn-save-client');
  if (btn) {
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Saving...';
  }
  
  google.script.run
    .withSuccessHandler(c => {
      if (editingClientId) {
        toast('Client details updated successfully!', 'success');
      } else {
        toast('Client saved successfully with ID: ' + c.id, 'success');
      }
      
      cancelClientEdit();
      loadClients();
    })
    .withFailureHandler(err => {
      handleError(err);
      if (btn) {
        btn.disabled = false;
        btn.innerHTML = editingClientId ? '<i data-lucide="check-circle"></i> Update Client Details' : '<i data-lucide="plus-circle"></i> Save Client Details';
      }
      if (window.lucide) lucide.createIcons();
    })
    .saveClient(client);
}

function populateClientSelect() {
  // 1. Slip client select
  const selSlip = $('#slip-client');
  if (selSlip) {
    const current = selSlip.value;
    selSlip.innerHTML = '<option value="">-- Choose Client --</option>';
    clients.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.id;
      opt.textContent = `${c.name} ${c.company ? ' - ' + c.company : ''} [${c.id}]`;
      selSlip.appendChild(opt);
    });
    selSlip.value = current;
  }

  // 2. Order client select
  const selOrder = $('#order-client');
  if (selOrder) {
    const current = selOrder.value;
    selOrder.innerHTML = '<option value="">-- Choose Client --</option>';
    clients.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.id;
      opt.textContent = `${c.name} ${c.company ? ' - ' + c.company : ''} [${c.id}]`;
      selOrder.appendChild(opt);
    });
    selOrder.value = current;
  }
}

function toggleNewSlipClientBtn() {
  const div = $('#new-client-fields');
  if (!div) return;
  const isHidden = div.style.display === 'none';
  if (isHidden) {
    div.style.display = 'block';
    if ($('#new-client-name')) {
      $('#new-client-name').required = true;
      $('#new-client-name').value = '';
    }
    if ($('#new-client-company')) $('#new-client-company').value = '';
    if ($('#new-client-phone')) $('#new-client-phone').value = '';
    if ($('#new-client-address')) $('#new-client-address').value = '';
    setTimeout(function () {
      try { div.scrollIntoView({ behavior: 'smooth', block: 'center' }); } catch (e) {}
      try { highlightElement(div); } catch (e) {}
      const nm = $('#new-client-name');
      if (nm) nm.focus();
    }, 50);
  } else {
    div.style.display = 'none';
    if ($('#new-client-name')) $('#new-client-name').required = false;
  }
}

function toggleNewClient() {
  // Hide the inline client creation card if the user picks any existing client
  const div = $('#new-client-fields');
  if (div) {
    div.style.display = 'none';
    if ($('#new-client-name')) $('#new-client-name').required = false;
  }
}

function toggleNewOrderClientBtn() {
  const div = $('#new-order-client-fields');
  if (!div) return;
  const isHidden = div.style.display === 'none';
  if (isHidden) {
    div.style.display = 'block';
    if ($('#new-order-client-name')) {
      $('#new-order-client-name').required = true;
      $('#new-order-client-name').value = '';
    }
    if ($('#new-order-client-company')) $('#new-order-client-company').value = '';
    if ($('#new-order-client-phone')) $('#new-order-client-phone').value = '';
    if ($('#new-order-client-address')) $('#new-order-client-address').value = '';
    setTimeout(function () {
      try { div.scrollIntoView({ behavior: 'smooth', block: 'center' }); } catch (e) {}
      try { highlightElement(div); } catch (e) {}
      const nm = $('#new-order-client-name');
      if (nm) nm.focus();
    }, 50);
  } else {
    div.style.display = 'none';
    if ($('#new-order-client-name')) $('#new-order-client-name').required = false;
  }
}

function toggleNewOrderClient() {
  // Hide the inline client creation card if the user picks any existing client
  const div = $('#new-order-client-fields');
  if (div) {
    div.style.display = 'none';
    if ($('#new-order-client-name')) $('#new-order-client-name').required = false;
  }
}
</script>
