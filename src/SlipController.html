<script>
/**
 * Packing Slip Software - Packing Slip Controller
 * Form management, item grids, searching, filtering, and previewing
 */

function addItemRow(name, qty, scrollToRow, orderId, description, ordered) {
  const container = $('#items-container');
  if (!container) return;

  const row = document.createElement('div');
  row.className = 'item-row card-sm-inset animate-fade-in';
  row.dataset.orderId = orderId || '';

  // Use unique timestamp to coordinate names and labels
  const id = 'item-' + Date.now() + '-' + Math.floor(Math.random()*1000);

  // Render `ordered` only when caller provides a positive integer; otherwise
  // leave the field blank so the user can choose to specify leftovers.
  var orderedAttr = (ordered === 0 || (ordered !== undefined && ordered !== null && ordered !== '' && !isNaN(ordered) && Number(ordered) >= 0))
    ? ' value="' + escapeHtml(String(ordered)) + '"'
    : '';

  row.innerHTML = `
    <div class="field-group flex-3">
      <label for="${id}-name" class="label-inline">Product Name</label>
      <input type="text" id="${id}-name" class="item-name" placeholder="Start typing product name..." value="${escapeHtml(name || '')}" list="suggestions-list" oninput="updateRowBalanceHint('${id}')" required>
      <label for="${id}-desc" class="label-inline" style="margin-top: 0.35rem;">Packing Description (optional)</label>
      <input type="text" id="${id}-desc" class="item-description" placeholder="e.g. 20x30 inch, polyester, color..." value="${escapeHtml(description || '')}">
      <div id="${id}-balance-container" class="item-balance-hint"></div>
    </div>
    <div class="field-group flex-1">
      <label for="${id}-ordered" class="label-inline">Ordered <span class="text-muted" style="font-weight:400; text-transform:none; letter-spacing:0;">(optional)</span></label>
      <input type="number" id="${id}-ordered" class="item-ordered" placeholder="—" min="0" step="1"${orderedAttr} title="Ordered quantity on the linked Order. Leave blank to use Dispatched qty.">
    </div>
    <div class="field-group flex-1">
      <label for="${id}-qty" class="label-inline">Dispatched Qty</label>
      <input type="number" id="${id}-qty" class="item-qty" placeholder="Qty" min="1" step="1" value="${(qty === '' || qty === null || qty === undefined) ? '' : qty}" oninput="updateRowBalanceHint('${id}')" required>
    </div>
    <div class="btn-delete-container">
      <button type="button" class="btn-icon btn-danger-soft" onclick="removeItemRow(this)" title="Remove Item">
        <i data-lucide="trash-2"></i>
      </button>
    </div>
  `;

  container.appendChild(row);
  if (window.lucide) lucide.createIcons();

  if (orderId) {
    updateRowBalanceHint(id);
  }

  if (scrollToRow !== false) {
    setTimeout(() => {
      row.scrollIntoView({ behavior: 'smooth', block: 'center' });
      highlightElement(row);
    }, 50);
  }

  return row;
}

function highlightElement(el) {
  if (!el) return;
  el.classList.add('highlight-pulse');
  setTimeout(() => el.classList.remove('highlight-pulse'), 1500);
}

function removeItemRow(button) {
  const rows = $$('#items-container .item-row');
  if (rows.length <= 1) {
    toast('A packing slip must contain at least 1 item.', 'warning');
    return;
  }
  const row = button.closest('.item-row');
  if (row) {
    row.classList.add('animate-fade-out');
    setTimeout(() => row.remove(), 250);
  }
}

function loadSuggestions(clientId) {
  if (!clientId || clientId === 'new') {
    suggestions = [];
    renderSuggestions();
    return;
  }
  google.script.run
    .withSuccessHandler(list => {
      suggestions = list || [];
      renderSuggestions();
    })
    .withFailureHandler(handleError)
    .getSuggestions(clientId);
}

function renderSuggestions() {
  const box = $('#suggestions-box');
  if (!box) return;

  box.innerHTML = '<datalist id="suggestions-list"></datalist>';
  const list = $('#suggestions-list');

  if (!suggestions.length) {
    box.style.display = 'none';
    return;
  }

  box.style.display = 'block';

  // Create chips for quick clicking
  const chipContainer = document.createElement('div');
  chipContainer.className = 'chip-container';

  const title = document.createElement('div');
  title.className = 'suggestions-title';
  title.innerHTML = '<i data-lucide="sparkles" style="width:14px;height:14px;display:inline-block;vertical-align:middle;margin-right:4px;"></i> Previously ordered items (click to add):';
  chipContainer.appendChild(title);

  suggestions.forEach(s => {
    // Add to datalist for input autocompletes
    const opt = document.createElement('option');
    opt.value = s;
    list.appendChild(opt);

    // Add as quick chip
    const chip = document.createElement('span');
    chip.className = 'chip-suggestion';
    chip.textContent = s;
    chip.onclick = () => {
      // Find last empty row name and set it, or add new row
      const rows = $$('#items-container .item-row');
      let filled = false;
      for (let i = 0; i < rows.length; i++) {
        const inputName = rows[i].querySelector('.item-name');
        if (inputName && !inputName.value.trim()) {
          inputName.value = s;
          filled = true;
          break;
        }
      }
      if (!filled) {
        addItemRow(s, 1);
      }
      toast('Added item: ' + s, 'success');
    };
    chipContainer.appendChild(chip);
  });

  box.appendChild(chipContainer);
  if (window.lucide) lucide.createIcons();
}

function gatherItems() {
  const rows = $$('#items-container .item-row');
  const items = [];
  let valid = true;
  let firstIncompleteRow = null;
  let firstIncompleteField = null;

  rows.forEach((row, idx) => {
    const nameEl = row.querySelector('.item-name');
    const qtyEl = row.querySelector('.item-qty');

    const name = nameEl ? nameEl.value.trim() : '';
    const qtyVal = qtyEl ? qtyEl.value : '';
    const quantity = parseInt(qtyVal, 10);

    if (!name && !qtyVal) {
      // Completely blank row: mark for removal
      row.dataset.removeBlank = 'true';
      return;
    }

    if (!name) {
      row.dataset.removeBlank = 'false';
      toast(`Row ${idx + 1}: Product description is required.`, 'danger');
      if (!firstIncompleteRow) {
        firstIncompleteRow = row;
        firstIncompleteField = nameEl;
      }
      return;
    }

    if (isNaN(quantity) || quantity <= 0) {
      row.dataset.removeBlank = 'false';
      toast(`Row ${idx + 1}: Quantity must be a valid positive integer.`, 'danger');
      if (!firstIncompleteRow) {
        firstIncompleteRow = row;
        firstIncompleteField = qtyEl;
      }
      valid = false;
      return;
    }

    row.dataset.removeBlank = 'false';
    const orderId = row.dataset.orderId || '';
    const descEl = row.querySelector('.item-description');
    const description = descEl ? String(descEl.value || '').trim() : '';
    // Optional per-row ordered input. Empty / blank means "use Dispatched
    // qty as the ordered amount" when the slip auto-creates an order on save.
    const orderedEl = row.querySelector('.item-ordered');
    let ordered = '';
    if (orderedEl && orderedEl.value !== '' && orderedEl.value !== null && orderedEl.value !== undefined) {
      const n = Number(orderedEl.value);
      if (Number.isFinite(n) && n >= 0) ordered = n;
    }
    items.push({ name, quantity, orderId, description, ordered });
  });

  // Remove blank rows from the DOM
  $$('#items-container .item-row[data-remove-blank="true"]').forEach(row => {
    row.remove();
  });

  // If there are no items after cleanup, ensure at least one empty row remains for UX
  if (items.length === 0 && valid) {
    addItemRow('', 1, false);
  }

  // Scroll to first incomplete row if any
  if (firstIncompleteRow) {
    setTimeout(() => {
      firstIncompleteRow.scrollIntoView({ behavior: 'smooth', block: 'center' });
      highlightElement(firstIncompleteRow);
      if (firstIncompleteField) firstIncompleteField.focus();
    }, 50);
    valid = false;
  }

  return valid ? items : null;
}

function startNewSlip() {
  resetSlipForm();
  showPage('new-slip');
}

function savePackingSlip() {
  const clientId = $('#slip-client').value;
  const slipDate = $('#slip-date').value;
  const slipNotes = $('#slip-notes').value.trim();

  if (!slipDate) {
    toast('Date is required.', 'danger');
    return;
  }

  if (!clientId) {
    toast('Please select a client or create a new one.', 'danger');
    $('#slip-client').focus();
    return;
  }

  // Pull client details from the cache when the user has picked an existing
  // client; only read from inline fields when they're actively adding a new
  // one ("+ Add new client"). This avoids the bug where an existing-client
  // selection saved with empty inline inputs failed with "Please fill in
  // client name under Client Details".
  let client;
  if (clientId === 'new') {
    client = {
      id: '',
      name: $('#new-client-name').value.trim(),
      company: $('#new-client-company').value.trim(),
      phone: $('#new-client-phone').value.trim(),
      address: $('#new-client-address').value.trim()
    };
    if (!client.name) {
      toast('Please fill in client name under Client Details', 'danger');
      $('#new-client-name').focus();
      return;
    }
  } else {
    const cached = clients.find(c => c.id === clientId);
    if (!cached) {
      toast('Selected client not found in cache. Please refresh the page.', 'danger');
      return;
    }
    client = {
      id: cached.id,
      name: cached.name || '',
      company: cached.company || '',
      phone: cached.phone || '',
      address: cached.address || ''
    };
  }

  const items = gatherItems();
  if (items === null) return; // validation failed inside gatherItems
  if (items.length === 0) {
    toast('Please add at least one product item.', 'danger');
    return;
  }

  // The chip-based UI is the single source of truth for invoice numbers.
  const merged = invoiceNumbers.slice();

  const slip = {
    date: slipDate,
    clientId: client.id || '',
    clientName: client.name || '',
    clientCompany: client.company || '',
    clientPhone: client.phone || '',
    clientAddress: client.address || '',
    items: items,
    notes: slipNotes,
    invoiceNumber: merged.join(', '),
    invoiceNumbers: merged,
    linkedOrders: linkedOrderIds.slice(),
    linkedInvoices: merged.join(', ')
  };

  if (currentSlip && currentSlip.slipCode) {
    slip.slipCode = currentSlip.slipCode;
  }

  // Read Order Number field — auto-create an Order if the value is fresh
  // (not already in linkedOrderIds). Replaces linkedOrderIds so the typed #
  // becomes the canonical link.
  const orderNumField = $('#slip-order-number');
  const orderNum = orderNumField ? String(orderNumField.value || '').trim() : '';
  const shouldCreateOrder = orderNum && linkedOrderIds.indexOf(orderNum) === -1;

  const restore = _setButtonBusy($('#btn-save-slip'), 'Saving...');

  // Always save/update client in backend first to keep client directory updated
  google.script.run
    .withSuccessHandler(savedClient => {
      try {
        slip.clientId = savedClient.id;
        // Also update the local 'clients' array so the dropdown matches immediately
        const idx = clients.findIndex(c => c.id === savedClient.id);
        if (idx !== -1) {
          clients[idx] = savedClient;
        } else {
          clients.push(savedClient);
        }
        populateClientSelect(savedClient.id);

        // If a fresh Order # was typed, create the order FIRST so we can
        // link the slip to it. The order's items are pulled from the slip's
        // items — ordered = the per-row "Ordered" column (falling back to
        // Dispatched), shipped = Dispatched, descriptions intentionally empty
        // (descriptions stay on the slip only).
        const proceedToSaveSlip = function () { doSaveSlip(slip); };

        if (shouldCreateOrder) {
          // The freshly-typed Order # is the canonical link. Drop any prior
          // links from `linkedOrderIds` (and from each row's data-order-id)
          // so the saved slip reflects exactly the new order.
          linkedOrderIds.length = 0;
          items.forEach(function (it) { it.orderId = ''; });
          const rows = document.querySelectorAll('#items-container .item-row');
          rows.forEach(function (row) { row.dataset.orderId = ''; });

          const orderObj = {
            date: slip.date,
            clientId: savedClient.id,
            clientName: client.name || savedClient.name || '',
            items: items.map(function (it) {
              return {
                name: it.name,
                quantity: Number(it.ordered || it.quantity || 0),
                shipped: Number(it.quantity || 0),
                description: ''
              };
            }),
            status: 'Pending',
            invoiceNumbers: merged.slice(),
            invoiceNumbersRaw: merged.join(', '),
            customId: orderNum
          };
          google.script.run
            .withSuccessHandler(function (savedOrder) {
              try {
                if (savedOrder && savedOrder.id) {
                  linkedOrderIds.push(savedOrder.id);
                  slip.linkedOrders = linkedOrderIds.slice();
                  renderLinkedTags();
                }
                proceedToSaveSlip();
              } catch (e) {
                restore();
                handleError(e);
              }
            })
            .withFailureHandler(function (err) {
              restore();
              handleError(err);
            })
            .saveOrder(orderObj);
        } else {
          // No new order to create; proceed straight to the slip save.
          proceedToSaveSlip();
        }
      } catch (e) {
        restore();
        handleError(e);
      }
    })
    .withFailureHandler(err => {
      restore();
      handleError(err);
    })
    .saveClient(client);
}

function doSaveSlip(slip) {
  google.script.run
    .withSuccessHandler(saved => {
      currentSlip = saved;
      toast('Packing slip saved successfully: ' + saved.slipCode, 'success');

      const printBtn = $('#btn-print-slip');
      if (printBtn) printBtn.style.display = 'inline-flex';

      $('#slip-form-title').textContent = 'Packing Slip ' + saved.slipCode;

      const saveBtn = $('#btn-save-slip');
      if (saveBtn) {
        saveBtn.disabled = false;
        saveBtn.innerHTML = 'Save Packing Slip';
      }

      // Reflect saved merged invoice numbers locally
      if (Array.isArray(saved.invoiceNumbers)) {
        invoiceNumbers = saved.invoiceNumbers.slice();
      }
      renderInvoiceNumberTags();
      const quick = $('#slip-invoice-quick');
      if (quick) quick.value = '';

      loadClients();
      loadHome();
    })
    .withFailureHandler(err => {
      handleError(err);
      const saveBtn = $('#btn-save-slip');
      if (saveBtn) {
        saveBtn.disabled = false;
        saveBtn.innerHTML = 'Save Packing Slip';
      }
    })
    .savePackingSlip(slip);
}

/**
 * Disables a button, swaps its content for a spinner + busyLabel, and
 * returns a `restore` function callers must invoke once the task is done so
 * the button is reusable. Used by print + save actions.
 */
function _setButtonBusy(buttonEl, busyLabel) {
  if (!buttonEl) return function restore() {};
  const prevHtml = buttonEl.innerHTML;
  const prevDisabled = !!buttonEl.disabled;
  buttonEl.disabled = true;
  buttonEl.innerHTML = '<span class="spinner spinner-small"></span> ' + (busyLabel || 'Working...');
  let restored = false;
  return function restore() {
    if (restored) return;
    restored = true;
    buttonEl.disabled = prevDisabled;
    buttonEl.innerHTML = prevHtml;
    if (window.lucide) {
      try { window.lucide.createIcons(); } catch (e) {}
    }
  };
}

/**
 * Shows a page-wide overlay so the user always sees loading feedback while
 * a PDF is being generated, even after they navigated away from the print
 * trigger. The overlay uses the larger spinner variant for unmistakable
 * feedback. Pair every showPdfLoading() with a hidePdfLoading() in the
 * completion path so the overlay never stays up.
 */
function showLoading(text) {
  try {
    const ov = document.getElementById('pdf-loading-overlay');
    const txt = document.getElementById('pdf-loading-text');
    if (txt) txt.textContent = text || 'Processing...';
    if (ov) ov.style.display = '';
  } catch (e) {}
}
function hideLoading() {
  try {
    const ov = document.getElementById('pdf-loading-overlay');
    if (ov) ov.style.display = 'none';
  } catch (e) {}
}
function showPdfLoading() {
  showLoading('Generating PDF…');
}
function hidePdfLoading() {
  hideLoading();
}

// Back-compat alias kept for any old call sites.
function _setPrintBusy(buttonEl) { return _setButtonBusy(buttonEl, 'Generating PDF...'); }

function printCurrentSlip() {
  const restore = _setButtonBusy($('#btn-print-slip'), 'Generating PDF...');
  if (currentSlip) {
    let s = currentSlip;
    if (!Array.isArray(s.invoiceNumbers)) {
      s = Object.assign({}, currentSlip, { invoiceNumbers: invoiceNumbers.slice() });
    }
    try {
      generatePDFFromSlip(s, settings, restore);
    } catch (e) {
      restore();
      handleError(e);
    }
  } else {
    restore();
    toast('No slip is currently loaded to print.', 'warning');
  }
}

function printSlipByCode(slipCode, anchorEl) {
  const restore = _setButtonBusy(anchorEl, 'Generating PDF...');
  try {
    const s = slips.find(x => x.slipCode === slipCode);
    if (!s) {
      restore();
      toast('Packing slip code ' + slipCode + ' not found.', 'danger');
      return;
    }
    generatePDFFromSlip(s, settings, restore);
  } catch (e) {
    restore();
    handleError(e);
  }
}

function resetSlipForm() {
  $('#slip-form').reset();
  $('#items-container').innerHTML = '';
  addItemRow('', 1, false, '', '', '');
  toggleNewClient();
  currentSlip = null;

  // Clear linkage data
  linkedOrderIds = [];
  invoiceNumbers = [];
  currentLinkedStats = {};
  renderLinkedTags();
  renderInvoiceNumberTags();
  const quick = $('#slip-invoice-quick');
  if (quick) quick.value = '';
  const orderNumField = $('#slip-order-number');
  if (orderNumField) orderNumField.value = '';

  const printBtn = $('#btn-print-slip');
  if (printBtn) printBtn.style.display = 'none';

  $('#slip-form-title').textContent = 'Create New Packing Slip';
  $('#slip-date').valueAsDate = new Date();
}

function hydrateInvoiceNumbersFromSlip(slip) {
  if (!slip) return [];
  if (Array.isArray(slip.invoiceNumbers)) {
    return slip.invoiceNumbers
      .map(v => String(v || '').trim())
      .filter(Boolean)
      .filter((v, i, arr) => arr.indexOf(v) === i);
  }
  return (typeof slip.invoiceNumber === 'string' ? slip.invoiceNumber : '')
    .split(',')
    .map(s => String(s || '').trim())
    .filter(Boolean)
    .filter((v, i, arr) => arr.indexOf(v) === i);
}

function loadSlipForEdit(slipCode) {
  const slip = slips.find(x => x.slipCode === slipCode);
  if (!slip) {
    toast('Slip not found for editing', 'danger');
    return;
  }

  resetSlipForm();
  currentSlip = slip;

  $('#slip-date').value = slip.date;
  populateClientSelect();
  if (slip.clientId) {
    $('#slip-client').value = slip.clientId;
    toggleNewClient();
    if (slip.clientName) $('#new-client-name').value = slip.clientName;
    if (slip.clientCompany !== undefined) $('#new-client-company').value = slip.clientCompany || '';
    if (slip.clientPhone !== undefined) $('#new-client-phone').value = slip.clientPhone || '';
    if (slip.clientAddress !== undefined) $('#new-client-address').value = slip.clientAddress || '';
  }
  $('#slip-notes').value = slip.notes || '';

  // Linked Orders
  linkedOrderIds = (slip.linkedOrders || '').split(',').map(s => s.trim()).filter(Boolean);
  const orderNumField = $('#slip-order-number');
  if (orderNumField) {
    // Show the first linked order's id (canonical link) so the field mirrors
    // what was saved last. If none, clear it.
    orderNumField.value = linkedOrderIds[0] || '';
  }

  // Free-floating invoice numbers
  invoiceNumbers = hydrateInvoiceNumbersFromSlip(slip);
  renderLinkedTags();
  renderInvoiceNumberTags();
  const quick0 = $('#slip-invoice-quick');
  if (quick0) quick0.value = '';

  refreshLinkedStats(() => {
    $('#items-container').innerHTML = '';
    if (slip.items && slip.items.length) {
      slip.items.forEach(it => addItemRow(it.name, it.quantity, false, it.orderId, it.description, (it.ordered !== undefined ? it.ordered : '')));
    } else {
      addItemRow('', 1, false, '', '', '');
    }
  });

  loadSuggestions(slip.clientId);
  $('#slip-form-title').textContent = 'Edit Packing Slip (Updates #' + slip.slipCode + ')';

  const printBtn = $('#btn-print-slip');
  if (printBtn) printBtn.style.display = 'inline-flex';

  showPage('new-slip');
}

function duplicateSlipByCode(slipCode) {
  const slip = slips.find(x => x.slipCode === slipCode);
  if (!slip) {
    toast('Slip not found for duplicating', 'danger');
    return;
  }

  resetSlipForm();
  currentSlip = null; // null slipCode ensures it saves as a brand new copy with a new sequential ID

  $('#slip-date').valueAsDate = new Date();
  populateClientSelect();
  if (slip.clientId) {
    $('#slip-client').value = slip.clientId;
    toggleNewClient();
    if (slip.clientName) $('#new-client-name').value = slip.clientName;
    if (slip.clientCompany !== undefined) $('#new-client-company').value = slip.clientCompany || '';
    if (slip.clientPhone !== undefined) $('#new-client-phone').value = slip.clientPhone || '';
    if (slip.clientAddress !== undefined) $('#new-client-address').value = slip.clientAddress || '';
  }
  $('#slip-notes').value = slip.notes || '';

  // Linked Orders
  linkedOrderIds = (slip.linkedOrders || '').split(',').map(s => s.trim()).filter(Boolean);
  const orderNumField = $('#slip-order-number');
  if (orderNumField) {
    // Duplicates carry the same links as the source so the user can ship
    // any leftovers straight away against the original orders.
    orderNumField.value = linkedOrderIds[0] || '';
  }

  invoiceNumbers = hydrateInvoiceNumbersFromSlip(slip);
  renderLinkedTags();
  renderInvoiceNumberTags();
  const quick1 = $('#slip-invoice-quick');
  if (quick1) quick1.value = '';

  refreshLinkedStats(() => {
    $('#items-container').innerHTML = '';
    if (slip.items && slip.items.length) {
      slip.items.forEach(it => addItemRow(it.name, it.quantity, false, it.orderId, it.description, (it.ordered !== undefined ? it.ordered : '')));
    } else {
      addItemRow('', 1, false, '', '', '');
    }
  });

  loadSuggestions(slip.clientId);
  $('#slip-form-title').textContent = 'New Packing Slip (Duplicated from #' + slip.slipCode + ')';

  const printBtn = $('#btn-print-slip');
  if (printBtn) printBtn.style.display = 'none';

  showPage('new-slip');
}

function loadSlips() {
  const afterClients = () => {
    google.script.run
      .withSuccessHandler(list => {
        slips = list || [];
        populateFilterClient();
        renderSlips();
      })
      .withFailureHandler(handleError)
      .getPackingSlips();
  };

  if (!clients.length) {
    google.script.run
      .withSuccessHandler(list => {
        clients = list || [];
        populateClientSelect();
        populateFilterClient();
        afterClients();
      })
      .withFailureHandler(handleError)
      .getClients();
  } else {
    afterClients();
  }
}

function populateFilterClient() {
  const sel = $('#filter-client');
  if (!sel) return;
  const current = sel.value;
  sel.innerHTML = '<option value="">All clients</option>';

  clients.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.id;
    opt.textContent = `${c.name} [${c.id}]`;
    sel.appendChild(opt);
  });
  sel.value = current;
}

/**
 * After the slip preview modal is rendered (synchronously), enrich it with
 * ordered-vs-dispatched numbers and the linked-order date. Both lookups are
 * batched server-side so the in-app preview matches the printed PDF.
 *
 * @param {object} s         the slip being previewed
 * @param {string[]} linkedIds  unpicked order IDs linked to this slip
 * @param {number}  seq       monotonic id used to ignore stale responses
 */
function enrichSlipPreviewAsync(s, linkedIds, seq) {
  const clientId = s.clientId || '';
  if (!clientId || !linkedIds || !linkedIds.length) return;

  function stillThisSlip() { return window.__slipPreviewSeq === seq; }

  function patchItemsTbody(stats) {
    if (!stillThisSlip()) return;
    const tbody = $('#slip-preview-items-tbody');
    if (!tbody) return;
    const rows = tbody.querySelectorAll('tr');
    let totalOrdered = 0;
    let totalPreviouslyDispatched = 0;
    rows.forEach(function (row) {
      // Layout: 0=#, 1=Name, 2=Description, 3=Ordered, 4=Previously, 5=Dispatched
      const nameCell = row.children[1];
      const orderedCell = row.children[3];
      const prevCell = row.children[4];
      const dispatchedCell = row.children[5];
      const productName = nameCell ? String(nameCell.textContent || '').trim() : '';
      const stat = stats && stats[productName];
      const dispatchedQty = parseInt(dispatchedCell ? dispatchedCell.textContent : '0', 10) || 0;

      // Ordered column: only fill when the item maps to one of the linked
      // orders, otherwise show a muted dash.
      if (orderedCell) {
        if (!stat || !Number(stat.ordered || 0)) {
          orderedCell.innerHTML = '<span class="muted-dash">—</span>';
        } else {
          const orderedQty = Number(stat.ordered || 0);
          const delivered = Number(stat.delivered || 0);
          let badgeClass = 'badge-secondary';
          let badgeText = '';
          if (orderedQty <= 0) {
            badgeText = '';
          } else if (delivered + dispatchedQty >= orderedQty) {
            badgeClass = 'badge-success';
            badgeText = 'Fulfilled';
          } else {
            badgeClass = 'badge-warning';
            badgeText = (orderedQty - (delivered + dispatchedQty)) + ' pending';
          }
          orderedCell.innerHTML = `
            <div style="display:flex; flex-direction:column; align-items:center; gap:2px;">
              <strong>${orderedQty}</strong>
              ${badgeText ? `<span class="badge ${badgeClass}" style="font-size:0.65rem; padding:1px 4px;">${badgeText}</span>` : ''}
            </div>
          `;
          totalOrdered += orderedQty;
        }
      }

      // Previously Dispatched column: only fill when the item maps to a
      // linked order, otherwise muted dash.
      if (prevCell) {
        if (!stat || !Number(stat.delivered || 0)) {
          prevCell.innerHTML = '<span class="muted-dash">—</span>';
        } else {
          const prevQty = Number(stat.delivered || 0);
          prevCell.innerHTML = '<strong>' + prevQty + '</strong>';
          totalPreviouslyDispatched += prevQty;
        }
      }
    });

    // Patch totals row (the only row in tfoot).
    const totalsRow = $('#slip-preview-table tfoot tr');
    if (!totalsRow) return;
    const orderedTotalCell = totalsRow.querySelector('.ordered-total-cell');
    const prevTotalCell = totalsRow.querySelector('.prev-total-cell');
    if (orderedTotalCell) {
      orderedTotalCell.innerHTML = totalOrdered > 0
        ? '<strong>' + totalOrdered + '</strong>'
        : '<span class="muted-dash">—</span>';
    }
    if (prevTotalCell) {
      prevTotalCell.innerHTML = totalPreviouslyDispatched > 0
        ? '<strong>' + totalPreviouslyDispatched + '</strong>'
        : '<span class="muted-dash">—</span>';
    }
  }

  function patchOrderDate(metadataList) {
    if (!stillThisSlip()) return;
    const row = $('#slip-preview-order-date-row');
    const value = $('#slip-preview-order-date-value');
    if (!row || !value) return;
    if (!metadataList || !metadataList.length) return;
    const dates = metadataList.map(function (m) { return m && m.date; }).filter(Boolean);
    if (!dates.length) return;
    dates.sort();
    const earliest = dates[0];
    const sameAll = dates.every(function (d) { return d === earliest; });
    value.textContent = sameAll
      ? formatDate(earliest)
      : (formatDate(dates[0]) + ' \u2013 ' + formatDate(dates[dates.length - 1]));
    row.style.display = '';
  }

  google.script.run
    .withSuccessHandler(function (stats) { patchItemsTbody(stats || {}); })
    .withFailureHandler(function (err) { /* keep the dashes */ })
    .getLinkedDeliveryStats(clientId, linkedIds, s.slipCode);

  google.script.run
    .withSuccessHandler(function (metadataList) { patchOrderDate(metadataList || []); })
    .withFailureHandler(function (err) { /* leave hidden */ })
    .getLinkedOrderMetadata(linkedIds);
}

function renderSlips() {
  const term = $('#filter-search').value.toLowerCase();
  const clientFilter = $('#filter-client').value;
  const from = $('#filter-from').value;
  const to = $('#filter-to').value;
  const tbody = $('#slips-table tbody');

  if (!tbody) return;
  tbody.innerHTML = '';

  // Filter active slips and revision slips
  const activeSlips = slips.filter(s => s.slipCode.indexOf('-rev') === -1);
  const revisionSlips = slips.filter(s => s.slipCode.indexOf('-rev') !== -1);

  let filtered = activeSlips.slice().reverse();

  if (term) {
    filtered = filtered.filter(s => {
      const itemNames = (s.items || []).map(it => String(it.name || '')).join(' ');
      const searchable = [
        s.slipCode,
        s.clientName,
        s.clientCompany,
        s.clientPhone,
        s.clientAddress,
        s.invoiceNumber,
        s.notes,
        itemNames
      ].join(' ').toLowerCase();
      return searchable.includes(term);
    });
  }

  if (clientFilter) {
    filtered = filtered.filter(s => s.clientId === clientFilter);
  }

  if (from) {
    filtered = filtered.filter(s => s.date >= from);
  }

  if (to) {
    filtered = filtered.filter(s => s.date <= to);
  }

  const orderFilter = $('#filter-order') ? $('#filter-order').value.trim().toLowerCase() : '';
  const invoiceNumFilter = $('#filter-invoice-num') ? $('#filter-invoice-num').value.trim().toLowerCase() : '';

  if (orderFilter) {
    filtered = filtered.filter(s => {
      var ordersStr = String(s.linkedOrders || '').toLowerCase();
      var itemsMatch = (s.items || []).some(function(it) {
        return String(it.orderId || '').toLowerCase().indexOf(orderFilter) !== -1;
      });
      return ordersStr.indexOf(orderFilter) !== -1 || itemsMatch;
    });
  }

  if (invoiceNumFilter) {
    filtered = filtered.filter(s => {
      // Search across the unified invoiceNumbers array (preferred) AND the
      // legacy single-string fields so old data is still searchable.
      var arr = Array.isArray(s.invoiceNumbers) ? s.invoiceNumbers : [];
      var anyMatch = arr.some(function (n) {
        return String(n || '').toLowerCase().indexOf(invoiceNumFilter) !== -1;
      });
      var legacyHit = String(s.invoiceNumber || '').toLowerCase().indexOf(invoiceNumFilter) !== -1
        || String(s.linkedInvoices || '').toLowerCase().indexOf(invoiceNumFilter) !== -1;
      return anyMatch || legacyHit;
    });
  }

  const cardsContainer = $('#slips-cards-container');
  if (cardsContainer) cardsContainer.innerHTML = '';

  if (!filtered.length) {
    tbody.innerHTML = '<tr><td colspan="7" class="empty">No packing slips found matching criteria.</td></tr>';
    if (cardsContainer) {
      cardsContainer.innerHTML = '<div class="empty">No packing slips found matching criteria.</div>';
    }
    return;
  }

  filtered.forEach(s => {
    // Check if this slip has past revisions
    const revisions = revisionSlips.filter(r => r.slipCode.startsWith(s.slipCode + '-rev'));
    const isEdited = revisions.length > 0;
    const editedBadge = isEdited ? `<span class="badge badge-warning cursor-pointer" onclick="viewSlipByCode('${s.slipCode}')" style="margin-left: 6px; font-size: 0.7rem; font-weight: bold; background-color: rgba(245,158,11,0.15); color: var(--accent); padding: 2px 6px; border-radius: 4px; display: inline-flex; align-items: center; gap: 2px;" title="Click to view history"><i data-lucide="history" style="width:10px;height:10px;"></i> Edited</span>` : '';

    // 1. Render desktop table row
    const tr = document.createElement('tr');
    tr.className = 'table-row-animate';
    tr.innerHTML = `
      <td>
        <div style="display: flex; align-items: center; flex-wrap: wrap; gap: 4px;">
          <span class="badge badge-accent">${escapeHtml(s.slipCode)}</span>
          ${editedBadge}
        </div>
      </td>
      <td><strong>${formatDate(s.date)}</strong></td>
      <td>${escapeHtml(s.clientName)}</td>
      <td>${escapeHtml(s.clientCompany || '—')}</td>
      <td><span class="badge">${s.totalQuantity || 0}</span></td>
      <td><span class="badge badge-secondary" title="${escapeHtml(s.createdBy || '')}">${escapeHtml(getDisplayName(s.createdBy))}</span></td>
      <td>
        <div class="actions-group" style="position: relative; display: flex; align-items: center; gap: 0.25rem;">
          <button class="btn btn-secondary-soft btn-xs" onclick="viewSlipByCode('${s.slipCode}')" title="Preview Slip">
            <i data-lucide="eye"></i> View
          </button>
          <div class="custom-dropdown" style="position: relative; display: inline-block;">
            <button class="btn btn-secondary-soft btn-xs btn-icon-only dropdown-toggle" onclick="toggleRowDropdown(event, '${s.slipCode}')" title="More Actions">
              <i data-lucide="more-horizontal" style="width: 14px; height: 14px;"></i>
            </button>
            <div id="dropdown-${s.slipCode}" class="dropdown-menu-content" style="display: none; position: absolute; right: 0; top: 100%; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); box-shadow: var(--shadow-lg); z-index: 50; min-width: 130px; margin-top: 4px;">
              <button class="dropdown-item" onclick="loadSlipForEdit('${s.slipCode}')" style="width: 100%; text-align: left; padding: 0.5rem 0.75rem; background: transparent; border: none; font-size: 0.85rem; color: var(--text); display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                <i data-lucide="edit-3" style="width: 14px; height: 14px;"></i> Edit
              </button>
              <button class="dropdown-item" onclick="duplicateSlipByCode('${s.slipCode}')" style="width: 100%; text-align: left; padding: 0.5rem 0.75rem; background: transparent; border: none; font-size: 0.85rem; color: var(--text); display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                <i data-lucide="copy" style="width: 14px; height: 14px;"></i> Duplicate
              </button>
              <button class="dropdown-item" onclick="printSlipByCode('${s.slipCode}', this)" style="width: 100%; text-align: left; padding: 0.5rem 0.75rem; background: transparent; border: none; font-size: 0.85rem; color: var(--text); display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                <i data-lucide="printer" style="width: 14px; height: 14px; color: var(--accent);"></i> <span style="color: var(--accent); font-weight: 500;">PDF</span>
              </button>
            </div>
          </div>
        </div>
      </td>
    `;
    tbody.appendChild(tr);

    // 2. Render mobile card
    if (cardsContainer) {
      const card = document.createElement('div');
      card.className = 'slip-mobile-card animate-fade-in';
      card.innerHTML = `
        <div class="slip-card-header" onclick="viewSlipByCode('${s.slipCode}')">
          <div style="display: flex; align-items: center; flex-wrap: wrap; gap: 4px;">
            <span class="badge badge-accent font-bold">${escapeHtml(s.slipCode)}</span>
            ${editedBadge}
          </div>
          <span class="slip-card-date">${formatDate(s.date)}</span>
        </div>
        <div class="slip-card-body" onclick="viewSlipByCode('${s.slipCode}')">
          <h4 class="slip-card-client">${escapeHtml(s.clientName)}</h4>
          ${s.clientCompany ? `<div class="slip-card-company">${escapeHtml(s.clientCompany)}</div>` : ''}
          <div class="slip-card-qty-badge">
            <i data-lucide="package" style="width:14px;height:14px;display:inline-block;vertical-align:middle;margin-right:2px;"></i>
            Quantity: <strong>${s.totalQuantity || 0}</strong>
          </div>
          <div class="slip-card-creator" style="margin-top: 6px; font-size: 0.75rem; color: var(--muted);">
            Created by <span title="${escapeHtml(s.createdBy || '')}">${escapeHtml(getDisplayName(s.createdBy))}</span>
          </div>
        </div>
        <div class="slip-card-actions" style="position: relative; display: flex; justify-content: flex-end; gap: 0.5rem;">
          <button class="btn btn-secondary-soft btn-sm" onclick="event.stopPropagation(); viewSlipByCode('${s.slipCode}')" style="flex: 1;">
            <i data-lucide="eye"></i> View
          </button>
          <div class="custom-dropdown" style="position: relative; display: inline-block;">
            <button class="btn btn-secondary-soft btn-sm btn-icon-only dropdown-toggle" onclick="event.stopPropagation(); toggleRowDropdown(event, 'mob-${s.slipCode}')" style="height: 100%;">
              <i data-lucide="more-horizontal" style="width:16px;height:16px;"></i>
            </button>
            <div id="dropdown-mob-${s.slipCode}" class="dropdown-menu-content" style="display: none; position: absolute; right: 0; bottom: 100%; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); box-shadow: var(--shadow-lg); z-index: 50; min-width: 140px; margin-bottom: 4px;">
              <button class="dropdown-item" onclick="event.stopPropagation(); loadSlipForEdit('${s.slipCode}')" style="width: 100%; text-align: left; padding: 0.75rem 1rem; background: transparent; border: none; font-size: 0.9rem; color: var(--text); display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                <i data-lucide="edit-3" style="width: 16px; height: 16px;"></i> Edit
              </button>
              <button class="dropdown-item" onclick="event.stopPropagation(); duplicateSlipByCode('${s.slipCode}')" style="width: 100%; text-align: left; padding: 0.75rem 1rem; background: transparent; border: none; font-size: 0.9rem; color: var(--text); display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                <i data-lucide="copy" style="width: 16px; height: 16px;"></i> Duplicate
              </button>
              <button class="dropdown-item" onclick="event.stopPropagation(); printSlipByCode('${s.slipCode}', this)" style="width: 100%; text-align: left; padding: 0.75rem 1rem; background: transparent; border: none; font-size: 0.9rem; color: var(--text); display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                <i data-lucide="printer" style="width: 16px; height: 16px; color: var(--accent);"></i> <span style="color: var(--accent); font-weight: 500;">PDF</span>
              </button>
            </div>
          </div>
        </div>
      `;
      cardsContainer.appendChild(card);
    }
  });

  if (window.lucide) lucide.createIcons();
}

function toggleSlipFiltersDropdown() {
  const tray = $('#slip-filters-tray');
  const btn = $('#btn-toggle-slip-filters');
  if (!tray || !btn) return;
  const isHidden = tray.style.display === 'none';
  if (isHidden) {
    tray.style.display = 'grid';
    btn.classList.add('active');
  } else {
    tray.style.display = 'none';
    btn.classList.remove('active');
  }
}

function viewSlipByCode(slipCode) {
  // Find the exact slip (could be active or a revision)
  const s = slips.find(x => x.slipCode === slipCode);
  if (!s) return;

  // Find root code and associated slips
  const rootCode = slipCode.split('-rev')[0];
  const activeSlip = slips.find(x => x.slipCode === rootCode);
  const revisionSlips = slips.filter(x => x.slipCode.indexOf('-rev') !== -1);
  const revisions = revisionSlips.filter(r => r.slipCode.startsWith(rootCode + '-rev'));

  const getTimestamp = r => Number(r.slipCode.split('-rev')[1] || 0);
  revisions.sort((a, b) => getTimestamp(b) - getTimestamp(a));

  // After the synchronous modal renders below, kick off an async patch that
  // fills in ordered-vs-dispatched, description and order-date metadata when
  // the slip is linked to one or more orders. This keeps the initial render
  // fast and additive; if no orders are linked the patch is a no-op.
  const renderSeq = (window.__slipPreviewSeq = (window.__slipPreviewSeq || 0) + 1);
  const linkedIds = (s.linkedOrders || '').toString()
    .split(',').map(function (x) { return String(x || '').trim(); }).filter(Boolean);
  if (linkedIds.length) {
    enrichSlipPreviewAsync(s, linkedIds, renderSeq);
  }

  const isRevision = slipCode.indexOf('-rev') !== -1;

  $('#modal-title').textContent = isRevision ? 'Packing Slip Revision Detail' : 'Packing Slip Detail';
  const body = $('#modal-body');

  let html = '';

  // Warning Banner for Archived Versions
  if (isRevision) {
    const revTime = getTimestamp(s);
    html += `
      <div class="alert alert-warning animate-fade-in" style="margin-bottom: 1.25rem; display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 0.85rem; padding: 0.75rem 1rem; border-radius: 6px; background-color: rgba(245,158,11,0.12); color: var(--accent); border: 1px solid rgba(245,158,11,0.2);">
        <i data-lucide="alert-triangle" style="width: 16px; height: 16px; flex-shrink: 0;"></i>
        <span>Viewing Archived Version (Replaced on ${formatDateTime(revTime)})</span>
      </div>
    `;
  }

  // Normalise invoice numbers + linked orders for display
  const invNumbers = Array.isArray(s.invoiceNumbers) && s.invoiceNumbers.length
    ? s.invoiceNumbers
    : hydrateInvoiceNumbersFromSlip(s);
  const invDisplay = invNumbers.join(', ');
  const linkedOrdersStr = (s.linkedOrders || '').toString().split(',').map(x => x.trim()).filter(Boolean).join(', ');

  html += `
    <div class="preview-slip-document animate-scale-in">
      <!-- Document Header -->
      <div class="preview-header" style="display: flex; justify-content: space-between; align-items: flex-start; gap: 1.5rem;">
        <div class="preview-company" style="display: flex; align-items: flex-start; gap: 1rem;">
          ${settings.LogoBase64 ? `
            <img src="${settings.LogoBase64}" class="preview-logo" alt="Logo">
          ` : ''}
          <div class="preview-company-details">
            <h4 class="preview-company-name">${escapeHtml(settings.CompanyName || 'My Company')}</h4>
            <p class="preview-text-muted text-pre-line">${escapeHtml(settings.Address || '')}</p>
            <p class="preview-text-muted">${settings.Phone ? 'Phone: ' + escapeHtml(settings.Phone) : ''}</p>
          </div>
        </div>
        <div class="preview-slip-meta">
          <h2 class="preview-title">${isRevision ? 'ARCHIVED SLIP' : 'PACKING SLIP'}</h2>
          <div class="preview-meta-row">
            <span class="meta-label">Slip Code:</span>
            <span class="meta-value bold-badge">${escapeHtml(rootCode)}</span>
          </div>
          <div class="preview-meta-row" id="slip-preview-dispatch-row">
            <span class="meta-label">Dispatch Date:</span>
            <span class="meta-value">${formatDate(s.date)}</span>
          </div>
          <div class="preview-meta-row" id="slip-preview-order-date-row" style="display:none;">
            <span class="meta-label">Order Date:</span>
            <span class="meta-value" id="slip-preview-order-date-value"></span>
          </div>
          ${linkedOrdersStr ? `
          <div class="preview-meta-row">
            <span class="meta-label">Order #:</span>
            <span class="meta-value bold-badge">${escapeHtml(linkedOrdersStr)}</span>
          </div>
          ` : ''}
          ${invDisplay ? `
          <div class="preview-meta-row">
            <span class="meta-label">Invoice #:</span>
            <span class="meta-value bold-badge">${escapeHtml(invDisplay)}</span>
          </div>
          ` : ''}
          <div class="preview-meta-row">
            <span class="meta-label">Created By:</span>
            <span class="meta-value" title="${escapeHtml(s.createdBy || '')}">${escapeHtml(getDisplayName(s.createdBy))}</span>
          </div>
          ${s.editedBy && s.editedBy !== s.createdBy ? `
          <div class="preview-meta-row">
            <span class="meta-label">Edited By:</span>
            <span class="meta-value" title="${escapeHtml(s.editedBy)}">${escapeHtml(getDisplayName(s.editedBy))}</span>
          </div>
          ` : ''}
        </div>
      </div>

      <!-- Divider -->
      <hr class="preview-divider">

      <!-- Linked documents strip (always shown if present, even if metadata line is hidden) -->
      ${(linkedOrdersStr || invDisplay) ? `
      <div class="preview-reference-strip" style="display:flex; flex-wrap:wrap; gap:0.5rem; margin-bottom: 1.25rem;">
        ${linkedOrdersStr ? linkedOrdersStr.split(',').map(x => x.trim()).filter(Boolean).map(x => `<span class="badge badge-secondary" style="display:inline-flex; align-items:center; gap:6px;"><i data-lucide="shopping-bag" style="width:12px;height:12px;"></i> Order ${escapeHtml(x)}</span>`).join('') : ''}
        ${invDisplay ? invNumbers.map(x => `<span class="badge" style="display:inline-flex; align-items:center; gap:6px; background-color: var(--info-soft); color: var(--info); border-color: rgba(59,130,246,0.2);"><i data-lucide="file-text" style="width:12px;height:12px;"></i> Invoice ${escapeHtml(x)}</span>`).join('') : ''}
      </div>
      ` : ''}

      <!-- Shipping Details -->
      <div class="preview-shipping">
        <h5 class="preview-section-title">Deliver To:</h5>
        <div class="shipping-card">
          <h4 class="client-title">${escapeHtml(s.clientName)}</h4>
          ${s.clientCompany ? `<p class="client-company">${escapeHtml(s.clientCompany)}</p>` : ''}
          <p class="client-address text-pre-line">${escapeHtml(s.clientAddress || '')}</p>
          ${s.clientPhone ? `<p class="client-phone"><i data-lucide="phone" style="width:12px;height:12px;display:inline-block;vertical-align:middle;margin-right:4px;"></i> ${escapeHtml(s.clientPhone)}</p>` : ''}
        </div>
      </div>

      <!-- Items Table -->
      <div class="preview-items">
        <h5 class="preview-section-title">Package Contents:</h5>
        <table class="preview-table" id="slip-preview-table">
          <thead>
            <tr>
              <th class="text-center" style="width: 36px;">#</th>
              <th>Product Name</th>
              <th>Packing Description</th>
              <th class="text-center" style="width: 86px;">Ordered</th>
              <th class="text-center" style="width: 96px;">Previously Dispatched</th>
              <th class="text-center" style="width: 86px;">Dispatched</th>
            </tr>
          </thead>
          <tbody id="slip-preview-items-tbody">
  `;

  (s.items || []).forEach((it, idx) => {
    html += `
      <tr>
        <td class="text-center preview-row-index">${idx + 1}</td>
        <td class="preview-name-cell"><strong>${escapeHtml(it.name || '')}</strong></td>
        <td class="preview-desc-cell">${escapeHtml(it.description || '')}</td>
        <td class="text-center ordered-cell"><span class="muted-dash">—</span></td>
        <td class="text-center prev-dispatched-cell"><span class="muted-dash">—</span></td>
        <td class="text-center font-semibold dispatched-qty">${it.quantity}</td>
      </tr>

  });

  html += `
          </tbody>
          <tfoot>
            <tr>
              <td colspan="3" class="text-right font-semibold">Totals</td>
              <td class="text-center font-bold font-large ordered-total-cell"><span class="muted-dash">—</span></td>
              <td class="text-center font-bold font-large prev-total-cell"><span class="muted-dash">—</span></td>
              <td class="text-center font-bold font-large">${s.totalQuantity || (Array.isArray(s.items) ? s.items : []).reduce((a, b) => a + (parseInt(b.quantity, 10) || 0), 0)}</td>
            </tr>
          </tfoot>
        </table>
      </div>

      <!-- Notes Section -->
      ${s.notes ? `
        <div class="preview-notes">
          <h5 class="preview-section-title">Notes / Instructions:</h5>
          <div class="notes-card text-pre-line">${escapeHtml(s.notes)}</div>
        </div>
      ` : ''}

      <!-- Footer -->
      <div class="preview-footer">
        <p>Thank you for choosing ${escapeHtml(settings.CompanyName || 'My Company')}!</p>
      </div>
    </div>

    <!-- Signature block (always shown) -->
    <div class="signature-block" id="slip-preview-signature">
      <h5 class="preview-section-title" style="margin-bottom: 0.75rem;"><i data-lucide="signature"></i> Received By</h5>
      <div class="signature-grid">
        <div class="signature-line">
          <span class="signature-label">Name (Print)</span>
          <span class="signature-rule"></span>
        </div>
        <div class="signature-line">
          <span class="signature-label">Date</span>
          <span class="signature-rule"></span>
        </div>
        <div class="signature-line signature-line-wide">
          <span class="signature-label">Signature</span>
          <span class="signature-rule"></span>
        </div>
      </div>
    </div>
  `;

  // Fetch associated orders for this packing slip
  const linkedOrders = orders.filter(o => linkedIds.includes(String(o.id || '').trim()));
  let associatedOrdersHtml = '';
  if (linkedOrders.length > 0) {
    associatedOrdersHtml += `
      <div style="margin-top: 1.5rem; background: var(--primary-soft); padding: 1.25rem; border-radius: var(--radius-sm); border: 1px solid var(--border); box-shadow: var(--shadow-sm);" class="animate-fade-in">
        <h4 style="margin-top: 0; margin-bottom: 0.75rem; display: flex; align-items: center; gap: 0.5rem; font-size: 0.95rem; color: var(--primary); font-weight: 700;">
          <i data-lucide="shopping-bag" style="width: 16px; height: 16px;"></i> Associated Orders
        </h4>
        <div style="display: flex; flex-direction: column; gap: 8px;">
          ${linkedOrders.map(o => `
            <div style="display: flex; align-items: center; justify-content: space-between; background: var(--card); padding: 0.65rem 0.85rem; border-radius: var(--radius-xs); border: 1px solid var(--border);">
              <div>
                <span class="badge badge-accent order-id-badge cursor-pointer" onclick="viewOrderById('${escapeHtml(o.id)}')" style="vertical-align: middle; margin-right: 8px;" title="Click to view details: ${escapeHtml(o.id)}">${escapeHtml(o.id)}</span>
                <span style="font-size: 0.88rem; font-weight: 600;">${escapeHtml(o.clientName)}</span>
                <span style="font-size: 0.8rem; color: var(--text-muted); margin-left: 8px;">(${formatDate(o.date)})</span>
                <span class="badge ${o.status === 'Completed' ? 'badge-success' : o.status === 'Partially Delivered' ? 'badge-warning' : 'badge-info'}" style="margin-left: 8px; font-size: 0.7rem; padding: 1px 6px;">${escapeHtml(o.status)}</span>
              </div>
              <button class="btn btn-secondary-soft btn-xs" onclick="viewOrderById('${escapeHtml(o.id)}')" style="display: inline-flex; align-items: center; gap: 4px; padding: 4px 8px; font-size: 0.75rem;">
                <i data-lucide="eye" style="width: 12px; height: 12px;"></i> View Order
              </button>
            </div>
          `).join('')}
        </div>
      </div>
      <div style="height: 1rem;"></div>
    `;
  }
  html += associatedOrdersHtml;

  // Revision History Navigator Panel (Inside modal body)
  if (activeSlip && (revisions.length > 0)) {
    html += `
      <div class="revision-timeline">
        <h3 class="revision-timeline-title">
          <i data-lucide="history"></i> Revision History
        </h3>
        <div class="revision-list">

          <!-- Current Active Version Row -->
          <div class="revision-row ${!isRevision ? 'active' : ''}">
            <div class="revision-info">
              <span class="revision-dot"></span>
              <span class="revision-text"><strong>Current Active Version</strong> (${activeSlip.totalQuantity} items)</span>
            </div>
            ${isRevision ? `
              <button class="btn btn-secondary-soft btn-xs" onclick="viewSlipByCode('${activeSlip.slipCode}')" style="padding: 2px 8px; font-size: 0.75rem;">
                <i data-lucide="eye" style="width:12px;height:12px;"></i> View Current
              </button>
            ` : '<span style="color: var(--accent); font-weight: 600; font-size: 0.75rem;">Viewing Active</span>'}
          </div>

          <!-- Past Revisions Rows -->
          ${revisions.map((rev, index) => {
            const revTime = getTimestamp(rev);
            const isViewingThis = slipCode === rev.slipCode;
            return `
              <div class="revision-row ${isViewingThis ? 'active' : ''}">
                <div class="revision-info">
                  <span class="revision-dot"></span>
                  <span class="revision-text"><strong>Archived Version ${revisions.length - index}</strong> (${rev.totalQuantity} items) - ${formatDateTime(revTime)}</span>
                </div>
                ${!isViewingThis ? `
                  <button class="btn btn-secondary-soft btn-xs" onclick="viewSlipByCode('${rev.slipCode}')" style="padding: 2px 8px; font-size: 0.75rem;">
                    <i data-lucide="eye" style="width:12px;height:12px;"></i> View
                  </button>
                ` : '<span style="color: var(--accent); font-weight: 600; font-size: 0.75rem;">Viewing</span>'}
              </div>
            `;
          }).join('')}

        </div>
      </div>
    `;
  }

  html += `
    <!-- Action controls outside document -->
    <div class="modal-actions-bar">
      <button class="btn btn-accent btn-md btn-full" onclick="printSlipByCode('${s.slipCode}', this)">
        <i data-lucide="download"></i> Download ${isRevision ? 'Archived' : 'Official'} PDF
      </button>
      <button class="btn btn-secondary btn-md" onclick="closeModal()">
        Close
      </button>
    </div>
  `;

  body.innerHTML = html;
  $('#modal').classList.add('active');
  if (window.lucide) lucide.createIcons();
}

function closeModal() {
  $('#modal').classList.remove('active');
}

function formatDate(d) {
  if (!d) return '';
  if (typeof d === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(d)) {
    const parts = d.split('-');
    return parts[2] + '/' + parts[1] + '/' + parts[0];
  }
  const date = new Date(d);
  if (isNaN(date)) return d;
  return date.toLocaleDateString('en-GB', { day: '2-digit', month: '2-digit', year: 'numeric' });
}

function formatDateTime(d) {
  if (!d) return '';
  const date = typeof d === 'number' ? new Date(d) : new Date(d);
  if (isNaN(date.getTime())) return String(d);

  return date.toLocaleDateString(undefined, {
    month: 'short',
    day: 'numeric',
    year: 'numeric'
  }) + ' ' + date.toLocaleTimeString(undefined, {
    hour: '2-digit',
    minute: '2-digit'
  });
}

function getDisplayName(email) {
  if (!email) return 'Unknown';
  const username = email.split('@')[0].toLowerCase();
  const parts = username.split(/[\._-]/);
  if (parts.length > 0 && parts[0]) {
    const name = parts[0];
    return name.charAt(0).toUpperCase() + name.slice(1);
  }
  return 'Unknown';
}

function escapeHtml(text) {
  if (!text) return '';
  return text
    .toString()
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

// Toggle custom actions dropdowns
function toggleRowDropdown(event, code) {
  event.stopPropagation();
  const dropdown = document.getElementById('dropdown-' + code);
  if (!dropdown) return;

  // Close all other open dropdowns first
  const allDropdowns = document.querySelectorAll('.dropdown-menu-content');
  allDropdowns.forEach(d => {
    if (d.id !== 'dropdown-' + code) {
      d.style.display = 'none';
    }
  });

  // Toggle the clicked dropdown
  if (dropdown.style.display === 'block') {
    dropdown.style.display = 'none';
  } else {
    dropdown.style.display = 'block';
  }
}

// Close dropdowns when clicking anywhere outside
document.addEventListener('click', function(event) {
  if (!event.target.closest('.custom-dropdown')) {
    const allDropdowns = document.querySelectorAll('.dropdown-menu-content');
    allDropdowns.forEach(d => {
      d.style.display = 'none';
    });
  }
});

/* ------------------------------------------------------------------
 * Orders & Invoice Numbers Linking Logic
 * ------------------------------------------------------------------ */

let linkedOrderIds = [];
let invoiceNumbers = []; // free-floating invoice strings
let currentLinkedStats = {};

function renderLinkedTags() {
  const oContainer = $('#linked-orders-tags');
  if (oContainer) {
    if (!linkedOrderIds.length) {
      oContainer.innerHTML = '<span class="text-muted" style="font-size:0.85rem; font-style:italic;">No orders linked</span>';
    } else {
      oContainer.innerHTML = '';
      linkedOrderIds.forEach(id => {
        const tag = document.createElement('span');
        tag.className = 'link-tag';
        tag.dataset.orderId = id;
        tag.innerHTML = `${escapeHtml(id)} <button type="button" data-action="unlink-order" data-order-id="${escapeHtml(id)}" title="Unlink Order">&times;</button>`;
        oContainer.appendChild(tag);
      });
    }
  }
}

function normalizeInvoiceString(s) {
  const v = String(s == null ? '' : s).trim();
  return v;
}

function addInvoiceNumberTag(value) {
  const v = normalizeInvoiceString(value);
  if (!v) return false;
  if (invoiceNumbers.indexOf(v) !== -1) return false;
  invoiceNumbers.push(v);

  // Mirror the new number onto any locally-cached linked orders so the
  // Orders table reflects them without requiring a manual order edit.
  // The user still has to press Save on the order form to persist;
  // we are only keeping in-memory state in sync with the slip.
  if (Array.isArray(linkedOrderIds) && linkedOrderIds.length && Array.isArray(orders)) {
    linkedOrderIds.forEach(function (oid) {
      var o = orders.find(function (x) { return x && x.id === oid; });
      if (!o) return;
      if (!Array.isArray(o.invoiceNumbers)) o.invoiceNumbers = [];
      if (o.invoiceNumbers.indexOf(v) === -1) o.invoiceNumbers.push(v);
    });
  }
  return true; // caller is responsible for calling renderInvoiceNumberTags()
}

function removeInvoiceNumberTag(value) {
  const before = invoiceNumbers.length;
  invoiceNumbers = invoiceNumbers.filter(v => v !== value);
  return invoiceNumbers.length !== before;
}

function renderInvoiceNumberTags() {
  const container = $('#slip-invoice-numbers-tags');
  if (!container) return;
  if (!invoiceNumbers.length) {
    container.innerHTML = '<span class="text-muted" style="font-size:0.85rem; font-style:italic;">No invoice numbers</span>';
    return;
  }
  container.innerHTML = '';
  invoiceNumbers.forEach(v => {
    const tag = document.createElement('span');
    tag.className = 'link-tag';
    tag.dataset.invoiceNumber = v;
    tag.innerHTML = `${escapeHtml(v)} <button type="button" data-action="remove-invoice" data-invoice="${escapeHtml(v)}" title="Remove invoice number">&times;</button>`;
    container.appendChild(tag);
  });
}

// Event delegation for chip-tag remove buttons. Using data-attributes instead
// of inline `onclick="…('value with potentially special chars')"` so invoice
// numbers / order IDs with quotes or other characters remove cleanly.
(function attachChipDelegation() {
  document.addEventListener('click', function (event) {
    const btn = event.target.closest && event.target.closest('button[data-action]');
    if (!btn) return;
    const action = btn.getAttribute('data-action');
    if (action === 'remove-invoice') {
      removeInvoiceNumberTag(btn.getAttribute('data-invoice'));
      renderInvoiceNumberTags();
    } else if (action === 'unlink-order') {
      unlinkOrder(btn.getAttribute('data-order-id'));
    }
  });
})();

function refreshLinkedStats(callback) {
  const clientId = $('#slip-client').value;
  if (!clientId || clientId === 'new' || !linkedOrderIds.length) {
    currentLinkedStats = {};
    updateAllRowBalanceHints();
    if (typeof callback === 'function') callback();
    return;
  }

  // When the form is editing an existing slip, exclude its own code so the
  // row-balance hint does not double-count the qty already on the slip being
  // edited (this was the source of the "treats the linked order as a new slip
  // on edit" bug).
  const excludeSlipCode = (currentSlip && currentSlip.slipCode) || '';

  google.script.run
    .withSuccessHandler(stats => {
      currentLinkedStats = stats || {};
      updateAllRowBalanceHints();
      if (typeof callback === 'function') callback();
    })
    .withFailureHandler(handleError)
    .getLinkedDeliveryStats(clientId, linkedOrderIds, excludeSlipCode);
}

function updateAllRowBalanceHints() {
  const rows = $$('#items-container .item-row');
  rows.forEach(row => {
    const nameEl = row.querySelector('.item-name');
    if (nameEl && nameEl.id) {
      const id = nameEl.id.replace('-name', '');
      updateRowBalanceHint(id);
    }
  });
}

function updateRowBalanceHint(id) {
  const nameEl = document.getElementById(id + '-name');
  const qtyEl = document.getElementById(id + '-qty');
  const container = document.getElementById(id + '-balance-container');

  if (!nameEl || !qtyEl || !container) return;
  container.innerHTML = '';

  const name = nameEl.value.trim();
  const qty = parseInt(qtyEl.value, 10) || 0;
  const row = nameEl.closest('.item-row');

  const oId = row.dataset.orderId;
  if (!oId) return; // Not linked

  const stat = currentLinkedStats[name];
  if (!stat) {
    container.innerHTML = '<span style="color:var(--text-muted); font-size:0.75rem;">Not in linked Order items</span>';
    return;
  }

  const ordered = stat.ordered || 0;
  const prevDelivered = stat.delivered || 0;
  // currentSlip is already excluded server-side when editing, so `prevDelivered`
  // is the amount other slips have already shipped for this product. `qty` is
  // the form's row quantity (which on edit currently equals what the active
  // slip already shipped, hence no double-counting).
  const totalDelivered = prevDelivered + qty;

  let labelText = '';
  let badgeClass = 'badge-secondary';

  if (ordered === 0) {
    labelText = 'Pending dispatch';
    badgeClass = 'badge-secondary';
  } else if (totalDelivered === ordered) {
    labelText = 'Fully Delivered';
    badgeClass = 'badge-success';
  } else if (totalDelivered < ordered) {
    labelText = (ordered - totalDelivered) + ' remaining';
    badgeClass = 'badge-warning';
  } else {
    labelText = 'Over-delivered by ' + (totalDelivered - ordered);
    badgeClass = 'badge-danger';
  }

  container.innerHTML = `
    <div style="display:flex; align-items:center; gap:0.5rem; margin-top:0.25rem; flex-wrap: wrap;">
      <span class="badge ${badgeClass}" style="padding:1px 4px; font-size:0.7rem; border-radius:4px;">${labelText}</span>
      <span style="font-size:0.75rem; color:var(--text-muted);">
        Ordered: <strong>${ordered}</strong> &nbsp;|&nbsp; Prev: <strong>${prevDelivered}</strong> &nbsp;|&nbsp; This Slip: <strong>${qty}</strong>
      </span>
    </div>
  `;
}

// Modal links controllers
function openLinkOrderModal() {
  $('#link-order-modal').classList.add('active');

  const clientId = $('#slip-client') ? $('#slip-client').value : '';
  const tbody = $('#link-order-table tbody');
  if (!tbody) return;

  if (!clientId || clientId === 'new') {
    tbody.innerHTML = '<tr><td colspan="4" class="empty" style="text-align: center; padding: 1rem;">Select a client on the form first.</td></tr>';
    return;
  }

  tbody.innerHTML = '<tr><td colspan="4" class="empty" style="text-align: center; padding: 1rem;">Loading orders...</td></tr>';

  google.script.run
    .withSuccessHandler(list => {
      orders = list || [];
      const clientOrders = orders.filter(o => String(o.clientId).trim() === String(clientId).trim() && linkedOrderIds.indexOf(o.id) === -1);

      tbody.innerHTML = '';
      if (!clientOrders.length) {
        tbody.innerHTML = '<tr><td colspan="4" class="empty" style="text-align: center; padding: 1rem;">No unlinked orders found for this client.</td></tr>';
        return;
      }

      clientOrders.forEach(o => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td style="padding: 0.5rem 0.25rem;"><strong>${escapeHtml(o.id)}</strong></td>
          <td style="padding: 0.5rem 0.25rem;">${formatDate(o.date)}</td>
          <td style="padding: 0.5rem 0.25rem;"><span class="badge">${escapeHtml(o.status)}</span></td>
          <td style="padding: 0.5rem 0.25rem; text-align: right;">
            <button type="button" class="btn btn-primary btn-xs" onclick="linkOrder('${o.id}')">Link</button>
          </td>
        `;
        tbody.appendChild(tr);
      });
    })
    .withFailureHandler(handleError)
    .getOrders();
}

function closeLinkOrderModal() {
  $('#link-order-modal').classList.remove('active');
}

let lastInvoiceModalTrigger = null;

function openAddInvoiceNumberModal(triggerEl) {
  const clientId = $('#slip-client').value;
  if (!clientId || clientId === 'new') {
    toast('Please select a registered client first.', 'warning');
    return;
  }
  lastInvoiceModalTrigger = triggerEl || (document.activeElement && document.activeElement.closest('button')) || document.activeElement;
  $('#link-invoice-num-modal').classList.add('active');
  const input = $('#add-invoice-num-input');
  if (input) {
    input.value = '';
    setTimeout(() => input.focus(), 50);
  }
  // Load smart suggestions from the backend (any invoice number ever used by
  // orders or packing slips for this client).
  google.script.run
    .withSuccessHandler(list => {
      renderInvoiceNumSuggestions(list || []);
    })
    .withFailureHandler(handleError)
    .getClientInvoiceNumbers(clientId);
}

function renderInvoiceNumSuggestions(list) {
  const box = $('#invoice-num-suggestions-box');
  if (!box) return;
  const available = (list || []).filter(v => invoiceNumbers.indexOf(v) === -1);
  box.innerHTML = '';
  if (!available.length) {
    box.innerHTML = '<div class="text-muted" style="font-size:0.85rem; padding: 0.75rem 0;">No prior invoice numbers found for this client — type a new one above.</div>';
    return;
  }
  const title = document.createElement('div');
  title.className = 'suggestions-title';
  title.innerHTML = '<i data-lucide="sparkles" style="width:14px;height:14px;display:inline-block;vertical-align:middle;margin-right:4px;"></i> Previously used invoice numbers (click to add):';
  box.appendChild(title);
  const chipWrap = document.createElement('div');
  available.forEach(v => {
    const chip = document.createElement('span');
    chip.className = 'chip-suggestion';
    chip.textContent = v;
    chip.onclick = () => {
      if (addInvoiceNumberTag(v)) {
        closeAddInvoiceNumberModal();
      }
    };
    chipWrap.appendChild(chip);
  });
  box.appendChild(chipWrap);
  if (window.lucide) lucide.createIcons();
}

function closeAddInvoiceNumberModal() {
  const m = $('#link-invoice-num-modal');
  if (m) m.classList.remove('active');
  if (lastInvoiceModalTrigger && typeof lastInvoiceModalTrigger.focus === 'function') {
    try { lastInvoiceModalTrigger.focus(); } catch (e) {}
  }
  lastInvoiceModalTrigger = null;
}

function saveAddInvoiceNumber() {
  const input = $('#add-invoice-num-input');
  if (!input) return;
  const v = normalizeInvoiceString(input.value);
  if (!v) {
    toast('Please enter an invoice number.', 'warning');
    return;
  }
  if (addInvoiceNumberTag(v)) {
    renderInvoiceNumberTags();
    closeAddInvoiceNumberModal();
  } else {
    toast('That invoice number is already on this slip.', 'info');
  }
}



// Link commands
function linkOrder(orderId) {
  if (linkedOrderIds.indexOf(orderId) !== -1) return;
  linkedOrderIds.push(orderId);
  renderLinkedTags();
  // Mirror the linked order's id into the Order Number field on the form
  // when it's currently blank, so the slip carries the link visibly.
  const orderNumField = $('#slip-order-number');
  if (orderNumField && !orderNumField.value.trim()) {
    orderNumField.value = orderId;
  }

  showLoading('Linking Order...');

  // Pull items of the linked order
  google.script.run
    .withSuccessHandler(list => {
      orders = list || [];
      const order = orders.find(o => o.id === orderId);
      if (order && Array.isArray(order.items)) {
        // If items-container has only 1 blank row, clear it
        const rows = $$('#items-container .item-row');
        if (rows.length === 1) {
          const name = rows[0].querySelector('.item-name').value.trim();
          if (!name) rows[0].remove();
        }

        // Pull active packing slips to calculate remaining balances
        google.script.run
          .withSuccessHandler(slipsList => {
            slips = slipsList || [];
            order.items.forEach(item => {
              const itemName = String(item.name || '').trim();
              const ordered = Number(item.quantity || 0);
              let delivered = 0;
              // When the user is editing this slip, exclude its own code so
              // the dispatched qty already on the slip does not double-count
              // when pre-filling the rows from the linked order. Filter is
              // applied per slip below; no further exclusion needed.
              const excludeCode = (currentSlip && currentSlip.slipCode) || '';
              slips.forEach(s => {
                if (s.slipCode.indexOf('-rev') === -1 && s.slipCode !== excludeCode) {
                  (s.items || []).forEach(it => {
                    if (String(it.name || '').trim() === itemName && it.orderId === orderId) {
                      delivered += Number(it.quantity || 0);
                    }
                  });
                }
              });
              const remaining = Math.max(0, ordered - delivered);
              if (remaining > 0 || delivered === 0) {
                // Pass '' for dispatched qty, and original ordered for ordered qty!
                addItemRow(item.name, '', false, orderId, '', ordered);
              }
            });
            // Auto-pull the order's invoice numbers onto the slip if not already present
            if (Array.isArray(order.invoiceNumbers)) {
              order.invoiceNumbers.forEach(addInvoiceNumberTag);
            }
            renderInvoiceNumberTags();
            refreshLinkedStats();
            hideLoading();
            closeLinkOrderModal();
          })
          .withFailureHandler(err => {
            hideLoading();
            handleError(err);
          })
          .getPackingSlips();
      } else {
        refreshLinkedStats();
        hideLoading();
        closeLinkOrderModal();
      }
    })
    .withFailureHandler(err => {
      hideLoading();
      handleError(err);
    })
    .getOrders();
}

function unlinkOrder(orderId) {
  linkedOrderIds = linkedOrderIds.filter(id => id !== orderId);
  renderLinkedTags();

  // Sync Order Number field: if it was showing the unlinked id (or empty),
  // reset it to the next linked order's id. Don't clobber a manually typed
  // value the user might want to keep.
  const orderNumField = $('#slip-order-number');
  if (orderNumField) {
    const current = orderNumField.value.trim();
    if (!current || current === orderId) {
      orderNumField.value = linkedOrderIds[0] || '';
    }
  }

  // Remove items in items-container belonging to this orderId
  const rows = $$('#items-container .item-row');
  rows.forEach(row => {
    if (row.dataset.orderId === orderId) {
      row.remove();
    }
  });

  // If container became empty, add one blank row
  if ($$('#items-container .item-row').length === 0) {
    addItemRow('', 1, false);
  }

  refreshLinkedStats();
}



/* ------------------------------------------------------------------
 * Save New Client (independent of slip save)
 * ------------------------------------------------------------------ */

/**
 * Reads the slip form's inline new-client inputs and validates them.
 * Returns { client, ok, error }.
 */
function _readValidateNewSlipClient() {
  const nameEl = $('#new-client-name');
  const companyEl = $('#new-client-company');
  const phoneEl = $('#new-client-phone');
  const addressEl = $('#new-client-address');
  const client = {
    name: nameEl ? String(nameEl.value || '').trim() : '',
    company: companyEl ? String(companyEl.value || '').trim() : '',
    phone: phoneEl ? String(phoneEl.value || '').trim() : '',
    address: addressEl ? String(addressEl.value || '').trim() : ''
  };
  if (!client.name) return { client: client, ok: false, error: 'Client name is required.' };
  if (!client.phone && !client.address) {
    return { client: client, ok: false, error: 'Phone or Address is required so the client is usable on printed slips.' };
  }
  return { client: client, ok: true, error: '' };
}

/**
 * Saves the inline new-client inputs as an independent record (no slip
 * save required), refreshes the client dropdown, auto-selects the new
 * client, and hides the inline fields panel so the form behaves as if the
 * client had always existed. Used by the "+ Save Client Now" button
 * surfaced under "Select Client" on the packing slip form.
 */
function saveNewSlipClient() {
  const btn = $('#btn-save-new-slip-client');
  const restore = _setButtonBusy(btn, 'Saving...');
  try {
    const v = _readValidateNewSlipClient();
    if (!v.ok) { toast(v.error, 'warning'); restore(); return; }
    google.script.run
      .withSuccessHandler(saved => {
        try {
          if (!saved || !saved.id) { toast('Save failed (no client id returned).', 'danger'); restore(); return; }
          // Append to local cache and refresh the dropdown.
          clients.push(saved);
          if (typeof populateClientSelect === 'function') {
            populateClientSelect(saved.id);
          }
          // Switch the select from "new" over to the freshly created client.
          const select = $('#slip-client');
          if (select) select.value = saved.id;
          // Hide the inline panel now that the dropdown shows the saved client.
          const fields = $('#new-client-fields');
          if (fields) fields.style.display = 'none';
          toast('Saved client ' + (saved.name || '') + ' (' + saved.id + ').', 'success');
          // Refresh linked-order suggestions and any dependent UI.
          try { loadClients(); } catch (e) {}
        } finally { restore(); }
      })
      .withFailureHandler(err => { handleError(err); restore(); })
      .saveClient(v.client);
  } catch (e) {
    handleError(e);
    restore();
  }
}
