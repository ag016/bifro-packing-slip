<script>
/**
 * Packing Slip Software - Order Controller
 * Order management event handlers, rendering, suggestions, and optional Custom Order ID.
 */

let editingOrderId = null;

function loadOrders(callback) {
  if (clients.length) {
    populateClientSelect();
  }
  if ($('#order-date') && !$('#order-date').value) {
    $('#order-date').valueAsDate = new Date();
  }
  // Ensure clients are loaded first since orders reference clients
  if (!clients.length) {
    google.script.run
      .withSuccessHandler(list => {
        clients = list || [];
        populateClientSelect();
        if ($('#order-date') && !$('#order-date').value) {
          $('#order-date').valueAsDate = new Date();
        }
        doLoadOrders(callback);
      })
      .withFailureHandler(handleError)
      .getClients();
  } else {
    doLoadOrders(callback);
  }
}

function doLoadOrders(callback) {
  google.script.run
    .withSuccessHandler(list => {
      orders = list || [];
      renderOrders();
      if (typeof populateClientSelect === 'function') populateClientSelect();
      populateOrderFilterClient();
      if (typeof callback === 'function') callback();
    })
    .withFailureHandler(handleError)
    .getOrders();
}

function populateOrderFilterClient() {
  const sel = $('#order-filter-client');
  if (!sel) return;
  const current = sel.value;
  sel.innerHTML = '<option value="">All clients</option>';
  clients.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.id;
    opt.textContent = `${c.name} [${c.id}]`;
    sel.appendChild(opt);
  });
  sel.value = current;
}

function toggleOrderFiltersDropdown() {
  const tray = $('#order-filters-tray');
  const btn = $('#btn-toggle-order-filters');
  if (!tray || !btn) return;
  const isHidden = tray.style.display === 'none';
  if (isHidden) {
    tray.style.display = 'grid';
    btn.classList.add('active');
  } else {
    tray.style.display = 'none';
    btn.classList.remove('active');
  }
}

/* ------------------------------------------------------------------
 * Save New Client on the Order form (independent of order save)
 * ------------------------------------------------------------------ */

function toggleNewOrderClient() {
  const sel = $('#order-client');
  const fields = $('#new-order-client-fields');
  if (!sel || !fields) return;
  if (sel.value === 'new') {
    fields.style.display = '';
    const nm = $('#new-order-client-name');
    if (nm) setTimeout(function () { nm.focus(); }, 50);
  } else {
    fields.style.display = 'none';
  }
}

function _readNewOrderClient() {
  return {
    name: ($('#new-order-client-name') ? $('#new-order-client-name').value : '').trim(),
    company: ($('#new-order-client-company') ? $('#new-order-client-company').value : '').trim(),
    phone: ($('#new-order-client-phone') ? $('#new-order-client-phone').value : '').trim(),
    address: ($('#new-order-client-address') ? $('#new-order-client-address').value : '').trim()
  };
}

function saveNewOrderClient() {
  const btn = $('#btn-save-new-order-client');
  const restore = _setButtonBusy ? _setButtonBusy(btn, 'Saving...') : function () {};
  try {
    const client = _readNewOrderClient();
    if (!client.name) { toast('Client name is required.', 'warning'); restore(); return; }
    if (!client.phone && !client.address) {
      toast('Phone or Address is required so the client is usable on printed slips.', 'warning');
      restore();
      return;
    }
    google.script.run
      .withSuccessHandler(function (saved) {
        try {
          if (!saved || !saved.id) { toast('Save failed.', 'danger'); restore(); return; }
          clients.push(saved);
          if (typeof populateClientSelect === 'function') populateClientSelect();
          const sel = $('#order-client');
          if (sel) sel.value = saved.id;
          const fields = $('#new-order-client-fields');
          if (fields) fields.style.display = 'none';
          toast('Saved client ' + (saved.name || '') + ' (' + saved.id + ').', 'success');
          try { loadOrderClientSuggestions(); } catch (e) {}
        } finally { restore(); }
      })
      .withFailureHandler(function (err) { handleError(err); restore(); })
      .saveClient(client);
  } catch (e) {
    handleError(e);
    restore();
  }
}

function renderOrders() {
  const tbody = $('#orders-table tbody');
  if (!tbody) return;
  tbody.innerHTML = '';

  const term = $('#order-filter-search') ? $('#order-filter-search').value.toLowerCase().trim() : '';
  const clientFilter = $('#order-filter-client') ? $('#order-filter-client').value : '';
  const from = $('#order-filter-from') ? $('#order-filter-from').value : '';
  const to = $('#order-filter-to') ? $('#order-filter-to').value : '';
  const statusFilter = $('#order-filter-status') ? $('#order-filter-status').value : '';

  let filtered = orders.slice().reverse();

  if (term) {
    filtered = filtered.filter(o => {
      const itemNames = (o.items || []).map(it => String(it.name || '')).join(' ');
      const itemDescs = (o.items || []).map(it => String(it.description || '')).join(' ');
      const searchable = [
        o.id,
        o.clientName,
        o.status,
        itemNames,
        itemDescs
      ].join(' ').toLowerCase();
      return searchable.indexOf(term) !== -1;
    });
  }

  if (clientFilter) {
    filtered = filtered.filter(o => o.clientId === clientFilter);
  }
  if (from) {
    filtered = filtered.filter(o => o.date >= from);
  }
  if (to) {
    filtered = filtered.filter(o => o.date <= to);
  }
  if (statusFilter) {
    filtered = filtered.filter(o => o.status === statusFilter);
  }

  if (!filtered.length) {
    tbody.innerHTML = '<tr><td colspan="8" class="empty">No matching orders found.</td></tr>';
    return;
  }

  filtered.forEach(o => {
    let statusClass = 'badge-secondary';
    if (o.status === 'Pending') statusClass = 'badge-info';
    else if (o.status === 'Partially Delivered') statusClass = 'badge-warning';
    else if (o.status === 'Completed') statusClass = 'badge-success';

    const items = Array.isArray(o.items) ? o.items : [];
    const ordered = items.reduce((sum, item) => sum + Number(item.quantity || 0), 0);
    const dispatched = items.reduce((sum, item) => sum + Number(item.shipped || 0), 0);
    const remaining = Math.max(0, ordered - dispatched);

    let remainingBadge = '';
    if (remaining === 0) {
      remainingBadge = `<span class="badge badge-success-soft" style="color: var(--success); background: rgba(34, 197, 94, 0.1);">${remaining}</span>`;
    } else {
      remainingBadge = `<span class="badge badge-warning-soft" style="color: var(--warning); background: rgba(245, 158, 11, 0.1); font-weight: 600;">${remaining}</span>`;
    }

    const tr = document.createElement('tr');
    tr.className = 'table-row-animate';
    tr.innerHTML = `
      <td><span class="badge badge-accent order-id-badge cursor-pointer" onclick="viewOrderById('${escapeHtml(o.id || '')}')" title="Click to view details: ${escapeHtml(o.id || '')}">${escapeHtml(o.id || '')}</span></td>
      <td><strong>${formatDate(o.date)}</strong></td>
      <td>${escapeHtml(o.clientName || '')}</td>
      <td class="text-center">
        <div style="display: flex; flex-direction: column; align-items: center; justify-content: center;">
          <strong>${ordered}</strong>
          <span class="text-muted" style="font-size:0.75rem; white-space: nowrap; margin-top: 2px;">${items.length} ${items.length === 1 ? 'item' : 'items'}</span>
        </div>
      </td>
      <td class="text-center"><strong>${dispatched}</strong></td>
      <td class="text-center">${remainingBadge}</td>
      <td><span class="badge ${statusClass}">${escapeHtml(o.status || 'Pending')}</span></td>
      <td>
        <div class="custom-dropdown" style="position: relative; display: inline-block;">
          <button class="btn btn-secondary-soft btn-xs btn-icon-only dropdown-toggle" onclick="toggleRowDropdown(event, 'order-${o.id}')" title="Actions">
            <i data-lucide="more-horizontal" style="width: 14px; height: 14px;"></i>
          </button>
          <div id="dropdown-order-${o.id}" class="dropdown-menu-content" style="display: none; position: absolute; right: 0; top: 100%; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); box-shadow: var(--shadow-lg); z-index: 50; min-width: 110px; margin-top: 4px;">
            <button class="dropdown-item" onclick="viewOrderById('${o.id}')" style="width: 100%; text-align: left; padding: 0.5rem 0.75rem; background: transparent; border: none; font-size: 0.85rem; color: var(--text); display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
              <i data-lucide="eye" style="width: 14px; height: 14px;"></i> View
            </button>
            <button class="dropdown-item" onclick="editOrder('${o.id}')" style="width: 100%; text-align: left; padding: 0.5rem 0.75rem; background: transparent; border: none; font-size: 0.85rem; color: var(--text); display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
              <i data-lucide="edit-2" style="width: 14px; height: 14px;"></i> Edit
            </button>
            <button class="dropdown-item" onclick="deleteOrderClick('${o.id}')" style="width: 100%; text-align: left; padding: 0.5rem 0.75rem; background: transparent; border: none; font-size: 0.85rem; color: var(--danger); display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
              <i data-lucide="trash-2" style="width: 14px; height: 14px; color: var(--danger);"></i> Delete
            </button>
          </div>
        </div>
      </td>
    `;
    tbody.appendChild(tr);
  });

  if (window.lucide) lucide.createIcons();
}

function viewOrderById(orderId) {
  const o = orders.find(x => String(x.id || '').trim() === String(orderId).trim());
  if (!o) {
    alert("Order not found or loaded.");
    return;
  }

  // Find all packing slips linked to this order
  const linkedSlips = slips.filter(s => {
    const linkedIds = (s.linkedOrders || '').toString().split(',').map(x => x.trim()).filter(Boolean);
    return linkedIds.includes(String(o.id || '').trim()) && s.slipCode.indexOf('-rev') === -1;
  });

  const items = Array.isArray(o.items) ? o.items : [];
  const ordered = items.reduce((sum, item) => sum + Number(item.quantity || 0), 0);
  const dispatched = items.reduce((sum, item) => sum + Number(item.shipped || 0), 0);
  const remaining = Math.max(0, ordered - dispatched);

  let statusClass = 'badge-secondary';
  if (o.status === 'Pending') statusClass = 'badge-info';
  else if (o.status === 'Partially Delivered') statusClass = 'badge-warning';
  else if (o.status === 'Completed') statusClass = 'badge-success';

  $('#modal-title').textContent = 'Order Detail';
  const body = $('#modal-body');

  let html = `
    <div class="preview-slip-document animate-scale-in" style="border-color: var(--primary);">
      <!-- Order Header -->
      <div class="preview-header" style="display: flex; justify-content: space-between; align-items: flex-start; gap: 1.5rem;">
        <div class="preview-company">
          <div class="preview-company-details">
            <h4 class="preview-company-name">ORDER RECORD</h4>
            <p class="preview-text-muted" style="margin-top: 4px;">ID: <span class="badge badge-accent" style="font-size:0.9rem; font-weight: 600;">${escapeHtml(o.id)}</span></p>
          </div>
        </div>
        <div class="preview-slip-meta">
          <h2 class="preview-title" style="color: var(--primary); margin-top:0;">ORDER</h2>
          <div class="preview-meta-row">
            <span class="meta-label">Order Date:</span>
            <span class="meta-value"><strong>${formatDate(o.date)}</strong></span>
          </div>
          <div class="preview-meta-row">
            <span class="meta-label">Status:</span>
            <span class="meta-value"><span class="badge ${statusClass}">${escapeHtml(o.status)}</span></span>
          </div>
        </div>
      </div>

      <div class="preview-divider"></div>

      <!-- Client card -->
      <div class="preview-shipping">
        <h5 class="preview-section-title">Client Info:</h5>
        <div class="shipping-card">
          <h4 class="client-title">${escapeHtml(o.clientName)}</h4>
          ${o.clientCompany ? `<p class="client-company">${escapeHtml(o.clientCompany)}</p>` : ''}
          ${o.clientAddress ? `<p class="client-address text-pre-line">${escapeHtml(o.clientAddress)}</p>` : ''}
          ${o.clientPhone ? `<p class="client-phone"><i data-lucide="phone" style="width:12px;height:12px;display:inline-block;vertical-align:middle;margin-right:4px;"></i> ${escapeHtml(o.clientPhone)}</p>` : ''}
        </div>
      </div>

      <!-- Items Table -->
      <div class="preview-items" style="margin-top: 1.5rem;">
        <h5 class="preview-section-title">Ordered Items:</h5>
        <table class="preview-table" id="order-detail-items-table">
          <thead>
            <tr>
              <th class="text-center" style="width: 36px;">#</th>
              <th>Product Name</th>
              <th>Product Description</th>
              <th class="text-center" style="width: 86px;">Ordered</th>
              <th class="text-center" style="width: 86px;">Dispatched</th>
              <th class="text-center" style="width: 86px;">Remaining</th>
            </tr>
          </thead>
          <tbody>
            ${items.map((it, idx) => {
              const rem = Math.max(0, Number(it.quantity || 0) - Number(it.shipped || 0));
              return `
                <tr>
                  <td class="text-center preview-row-index">${idx + 1}</td>
                  <td class="preview-name-cell"><strong>${escapeHtml(it.name || '')}</strong></td>
                  <td class="preview-desc-cell">${escapeHtml(it.description || '')}</td>
                  <td class="text-center"><strong>${it.quantity}</strong></td>
                  <td class="text-center"><strong>${it.shipped || 0}</strong></td>
                  <td class="text-center"><span class="badge ${rem === 0 ? 'badge-success-soft' : 'badge-warning-soft'}" style="font-size:0.8rem; padding:2px 6px;">${rem}</span></td>
                </tr>
              `;
            }).join('')}
          </tbody>
          <tfoot>
            <tr>
              <td colspan="3" class="text-right font-semibold">Totals</td>
              <td class="text-center font-bold">${ordered}</td>
              <td class="text-center font-bold">${dispatched}</td>
              <td class="text-center font-bold">${remaining}</td>
            </tr>
          </tfoot>
        </table>
      </div>
    </div>

    <!-- Associated Packing Slips Section -->
    <div style="margin-top: 1rem; margin-bottom: 1.5rem; background: var(--primary-soft); padding: 1.25rem; border-radius: var(--radius-sm); border: 1px solid var(--border); box-shadow: var(--shadow-sm);" class="animate-fade-in">
      <h4 style="margin-top: 0; margin-bottom: 0.75rem; display: flex; align-items: center; gap: 0.5rem; font-size: 0.95rem; color: var(--primary); font-weight: 700;">
        <i data-lucide="archive" style="width: 16px; height: 16px;"></i> Associated Packing Slips
      </h4>
      ${linkedSlips.length === 0 ? `
        <div style="font-size: 0.85rem; color: var(--text-muted); font-style: italic;">No packing slips generated for this order yet.</div>
      ` : `
        <div style="display: flex; flex-direction: column; gap: 8px;">
          ${linkedSlips.map(s => `
            <div style="display: flex; align-items: center; justify-content: space-between; background: var(--card); padding: 0.65rem 0.85rem; border-radius: var(--radius-xs); border: 1px solid var(--border);">
              <div>
                <span class="badge badge-accent font-bold" style="margin-right: 8px;">${escapeHtml(s.slipCode)}</span>
                <span style="font-size: 0.88rem; font-weight: 500;">Dispatched ${s.totalQuantity || 0} units</span>
                <span style="font-size: 0.8rem; color: var(--text-muted); margin-left: 8px;">(${formatDate(s.date)})</span>
              </div>
              <div style="display:flex; gap: 4px;">
                <button class="btn btn-secondary-soft btn-xs" onclick="viewSlipByCode('${escapeHtml(s.slipCode)}')" style="display: inline-flex; align-items: center; gap: 4px; padding: 4px 8px; font-size: 0.75rem;">
                  <i data-lucide="eye" style="width: 12px; height: 12px;"></i> View Slip
                </button>
              </div>
            </div>
          `).join('')}
        </div>
      `}
    </div>

    <!-- Actions outside doc -->
    <div class="modal-actions-bar">
      <button class="btn btn-secondary btn-md" onclick="closeModal()">
        Close
      </button>
    </div>
  `;

  body.innerHTML = html;
  $('#modal').classList.add('active');
  if (window.lucide) lucide.createIcons();
}

function addOrderItemRow(name, qty, shipped, description) {
  const container = $('#order-items-container');
  if (!container) return;

  const row = document.createElement('div');
  row.className = 'item-row-four-cols card-sm-inset animate-fade-in';
  const id = 'order-item-' + Date.now() + '-' + Math.floor(Math.random()*1000);

  row.innerHTML = `
    <div class="field-group flex-2">
      <label for="${id}-name" class="label-inline">Product Name</label>
      <input type="text" id="${id}-name" class="item-name" placeholder="Item name..." value="${escapeHtml(name || '')}" list="suggestions-list-order" required>
      <label for="${id}-desc" class="label-inline" style="margin-top: 0.35rem;">Product Description (optional)</label>
      <input type="text" id="${id}-desc" class="item-description" placeholder="e.g. 20x30 inch, polyester, color..." value="${escapeHtml(description || '')}">
    </div>
    <div class="field-group flex-1">
      <label for="${id}-qty" class="label-inline">Ordered Qty</label>
      <input type="number" id="${id}-qty" class="item-qty" placeholder="Qty" min="1" step="1" value="${qty || 1}" required>
    </div>
    <div class="field-group flex-1">
      <label for="${id}-shipped" class="label-inline">Amount Shipped (Optional)</label>
      <input type="number" id="${id}-shipped" class="item-shipped" placeholder="0" min="0" step="1" value="${shipped || 0}">
    </div>
    <div class="btn-delete-container">
      <button type="button" class="btn-icon btn-danger-soft" onclick="this.closest('.item-row-four-cols').remove()" title="Remove Row">
        <i data-lucide="trash-2"></i>
      </button>
    </div>
  `;
  container.appendChild(row);
  if (window.lucide) lucide.createIcons();
}

function editOrder(orderId) {
  const o = orders.find(x => x.id === orderId);
  if (!o) return;

  editingOrderId = o.id;

  $('#order-client').value = o.clientId || '';
  $('#order-date').value = o.date || '';

  const customIdInput = $('#order-custom-id');
  if (customIdInput) {
    customIdInput.value = o.id || '';
    customIdInput.disabled = true;
  }

  const invInput = $('#order-invoice-numbers');
  if (invInput) {
    invInput.value = Array.isArray(o.invoiceNumbers) ? o.invoiceNumbers.join(', ') : (o.invoiceNumbers || '');
  }

  // Populate items
  const container = $('#order-items-container');
  if (container) {
    container.innerHTML = '';
    if (o.items && o.items.length) {
      o.items.forEach(it => addOrderItemRow(it.name, it.quantity, it.shipped, it.description));
    } else {
      addOrderItemRow('', 1, 0, '');
    }
  }

  // Load suggestions
  loadOrderClientSuggestions();

  // UI state updates
  const cancelBtn = $('#btn-cancel-order-edit');
  if (cancelBtn) cancelBtn.style.display = 'inline-flex';

  const formCard = $('#orders .card:first-child');
  if (formCard) {
    formCard.querySelector('h2').innerHTML = `<i data-lucide="edit" style="color:var(--accent);"></i> Edit Order Details: ${o.id}`;
    $('#btn-save-order').innerHTML = '<i data-lucide="check-circle"></i> Update Order Details';
  }

  $('#order-form').scrollIntoView({ behavior: 'smooth' });
  if (window.lucide) lucide.createIcons();
}

function cancelOrderEdit() {
  editingOrderId = null;
  $('#order-form').reset();

  const customIdInput = $('#order-custom-id');
  if (customIdInput) {
    customIdInput.value = '';
    customIdInput.disabled = false;
  }

  const invInput = $('#order-invoice-numbers');
  if (invInput) invInput.value = '';

  $('#order-items-container').innerHTML = '';
  addOrderItemRow('', 1, 0, '');
  if ($('#order-date')) $('#order-date').valueAsDate = new Date();

  const box = $('#order-suggestions-box');
  if (box) box.style.display = 'none';

  const cancelBtn = $('#btn-cancel-order-edit');
  if (cancelBtn) cancelBtn.style.display = 'none';

  const formCard = $('#orders .card:first-child');
  if (formCard) {
    formCard.querySelector('h2').innerHTML = '<i data-lucide="shopping-cart" style="color:var(--accent);"></i> Register New Order';
    $('#btn-save-order').innerHTML = '<i data-lucide="plus-circle"></i> Save Order Details';
  }

  if (window.lucide) lucide.createIcons();
}

function saveOrderSubmit() {
  const clientId = $('#order-client').value;
  const orderDate = $('#order-date').value || new Date().toISOString().substring(0, 10);
  const customId = $('#order-custom-id').value.trim();

  if (!clientId) {
    toast('Client selection is required.', 'danger');
    return;
  }

  let clientObj = null;
  if (clientId !== 'new') {
    clientObj = clients.find(c => String(c.id).trim() === String(clientId).trim());
  }
  if (!clientObj) {
    if (clientId === 'new') {
      // User picked "+ Add new client" but neither saved it nor filled the
      // inline fields; surface a clear error so they know what to do.
      const v = _readNewOrderClient();
      if (!v.name) {
        toast('Please fill in the new client details above and click "Save Client Now" (or select an existing client).', 'warning');
        const fields = $('#new-order-client-fields');
        if (fields) {
          fields.style.display = '';
          const nm = $('#new-order-client-name');
          if (nm) setTimeout(function () { nm.focus(); }, 50);
        }
        return;
      }
      toast('Please click "Save Client Now" on the new client panel before saving the order.', 'warning');
      return;
    }
    toast('Selected client not found in database.', 'danger');
    return;
  }

  // Gather invoice numbers (comma-separated input)
  const invInput = $('#order-invoice-numbers');
  const invRaw = invInput ? invInput.value : '';
  const invoiceNumbers = String(invRaw || '')
    .split(',')
    .map(s => s.trim())
    .filter(Boolean);
  const seenInv = {};
  const dedupedInv = [];
  invoiceNumbers.forEach(v => { if (v && !seenInv[v]) { seenInv[v] = true; dedupedInv.push(v); } });

  // Gather items
  const rows = document.querySelectorAll('#order-items-container .item-row-four-cols');
  const items = [];
  let valid = true;

  rows.forEach((row, idx) => {
    const name = row.querySelector('.item-name').value.trim();
    const qty = parseInt(row.querySelector('.item-qty').value, 10);
    const shippedVal = row.querySelector('.item-shipped').value;
    const shipped = shippedVal !== '' ? parseInt(shippedVal, 10) : 0;
    const descEl = row.querySelector('.item-description');
    const description = descEl ? String(descEl.value || '').trim() : '';

    if (!name) {
      toast(`Row ${idx + 1}: Product name is required.`, 'danger');
      valid = false;
      return;
    }
    if (isNaN(qty) || qty <= 0) {
      toast(`Row ${idx + 1}: Quantity must be a valid positive integer.`, 'danger');
      valid = false;
      return;
    }
    if (isNaN(shipped) || shipped < 0) {
      toast(`Row ${idx + 1}: Shipped quantity must be a non-negative integer.`, 'danger');
      valid = false;
      return;
    }
    items.push({ name, quantity: qty, shipped: shipped, description: description });
  });

  if (!valid) return;

  const currentOrder = orders.find(o => o.id === editingOrderId) || {};
  const order = {
    id: editingOrderId || '',
    customId: customId,
    date: orderDate,
    clientId: clientId,
    clientName: clientObj.name,
    items: items,
    status: currentOrder.status || 'Pending',
    invoiceNumbers: dedupedInv,
    invoiceNumbersRaw: invRaw
  };

  const btn = $('#btn-save-order');
  if (btn) {
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Saving...';
  }

  google.script.run
    .withSuccessHandler(saved => {
      toast('Order saved successfully: ' + saved.id, 'success');
      cancelOrderEdit();
      loadOrders();
      if (btn) btn.disabled = false;
    })
    .withFailureHandler(err => {
      handleError(err);
      if (btn) {
        btn.disabled = false;
        btn.innerHTML = editingOrderId ? '<i data-lucide="check-circle"></i> Update Order Details' : '<i data-lucide="plus-circle"></i> Save Order Details';
      }
      if (window.lucide) lucide.createIcons();
    })
    .saveOrder(order);
}

function deleteOrderClick(orderId) {
  if (!confirm('Are you sure you want to delete Order ' + orderId + '? This action cannot be undone.')) return;
  
  google.script.run
    .withSuccessHandler(success => {
      if (success) {
        toast('Order deleted successfully.', 'success');
        loadOrders();
      } else {
        toast('Failed to delete order.', 'danger');
      }
    })
    .withFailureHandler(handleError)
    .deleteOrder(orderId);
}

function loadOrderClientSuggestions() {
  const clientId = $('#order-client').value;
  const box = $('#order-suggestions-box');
  if (!clientId || clientId === 'new') {
    if (box) box.style.display = 'none';
    return;
  }
  
  google.script.run
    .withSuccessHandler(list => {
      renderOrderSuggestions(list || []);
    })
    .withFailureHandler(handleError)
    .getSuggestions(clientId);
}

function renderOrderSuggestions(list) {
  const box = $('#order-suggestions-box');
  if (!box) return;
  
  box.innerHTML = '<datalist id="suggestions-list-order"></datalist>';
  const datalist = $('#suggestions-list-order');
  
  if (!list.length) {
    box.style.display = 'none';
    return;
  }
  
  box.style.display = 'block';
  
  const chipContainer = document.createElement('div');
  chipContainer.className = 'chip-container';
  
  const title = document.createElement('div');
  title.className = 'suggestions-title';
  title.innerHTML = '<i data-lucide="sparkles" style="width:14px;height:14px;display:inline-block;vertical-align:middle;margin-right:4px;"></i> Client Product Recommendations (click to add):';
  chipContainer.appendChild(title);
  
  list.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s;
    datalist.appendChild(opt);
    
    const chip = document.createElement('span');
    chip.className = 'chip-suggestion animate-scale-up';
    chip.textContent = s;
    chip.onclick = () => {
      const rows = document.querySelectorAll('#order-items-container .item-row-four-cols');
      let populated = false;
      for (let i = 0; i < rows.length; i++) {
        const nameVal = rows[i].querySelector('.item-name').value.trim();
        if (!nameVal) {
          rows[i].querySelector('.item-name').value = s;
          populated = true;
          break;
        }
      }
      if (!populated) {
        addOrderItemRow(s, 1, 0, '');
      }
    };
    chipContainer.appendChild(chip);
  });
  
  box.appendChild(chipContainer);
  if (window.lucide) lucide.createIcons();
}

// Initialise items container and listeners
document.addEventListener('DOMContentLoaded', () => {
  const container = $('#order-items-container');
  if (container) addOrderItemRow('', 1, 0, '');
  
  const clientSelect = $('#order-client');
  if (clientSelect) {
    clientSelect.addEventListener('change', () => {
      loadOrderClientSuggestions();
    });
  }
});
</script>
