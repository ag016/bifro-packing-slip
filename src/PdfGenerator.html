<script>
/**
 * Packing Slip Software - PDF Generator
 * Renders high-quality PDF downloads using jsPDF and AutoTable
 */

function generatePDF(slip, settings) {
  const { jsPDF } = window.jspdf;
  // A4 Page: 595.28 x 841.89 points
  const doc = new jsPDF('p', 'pt', 'a4');
  const pageW = doc.internal.pageSize.getWidth();
  const pageH = doc.internal.pageSize.getHeight();
  const margin = 45;
  let y = margin;

  // Company logo and details on the left (aligned to margin)
  let textX = margin;
  let maxTextW = 230;
  
  if (settings.LogoBase64) {
    try {
      const props = doc.getImageProperties(settings.LogoBase64);
      const originalW = props.width;
      const originalH = props.height;
      const ratio = originalW / originalH;
      
      const maxW = 90;
      const maxH = 45;
      let logoW = maxW;
      let logoH = logoW / ratio;
      
      if (logoH > maxH) {
        logoH = maxH;
        logoW = logoH * ratio;
      }
      
      // Draw logo image with correct aspect ratio
      doc.addImage(settings.LogoBase64, 'JPEG', margin, y, logoW, logoH);
      textX = margin + logoW + 15; // Dynamic gap based on logo width
      maxTextW = pageW - margin - textX - 150; // Dynamic text width constraint to avoid overlap with right metadata block
      if (maxTextW < 130) maxTextW = 130; // fallback minimum width
    } catch (e) {
      console.warn('PDF Logo drawing failed:', e);
      textX = margin;
      maxTextW = 230;
    }
  }

  const companyName = settings.CompanyName || 'My Company';
  doc.setFont('Helvetica', 'bold');
  doc.setFontSize(14);
  doc.setTextColor(15, 23, 42); // slate-900 (primary theme color)
  
  const compNameLines = doc.splitTextToSize(companyName, maxTextW);
  doc.text(compNameLines, textX, y + 12);
  
  doc.setFont('Helvetica', 'normal');
  doc.setFontSize(9);
  doc.setTextColor(71, 85, 105); // slate-600
  
  let cy = y + 17 + (compNameLines.length * 11);
  if (settings.Address) {
    const addrLines = doc.splitTextToSize(settings.Address, maxTextW);
    doc.text(addrLines, textX, cy);
    cy += addrLines.length * 11.5;
  }
  if (settings.Phone) {
    doc.text('Phone: ' + settings.Phone, textX, cy);
  }

  // Document Title & Metadata on the right
  doc.setFont('Helvetica', 'bold');
  doc.setFontSize(22);
  doc.setTextColor(30, 58, 95); // brand primary color
  const titleText = 'PACKING SLIP';
  const titleWidth = doc.getTextWidth(titleText);
  doc.text(titleText, pageW - margin - titleWidth, y + 20);
  
  doc.setFont('Helvetica', 'normal');
  doc.setFontSize(9.5);
  doc.setTextColor(71, 85, 105); // slate-600
  doc.text('Slip Code: ' + slip.slipCode, pageW - margin, y + 38, { align: 'right' });
  doc.text('Date: ' + formatDate(slip.date), pageW - margin, y + 52, { align: 'right' });
  if (slip.invoiceNumber) {
    doc.text('Invoice #: ' + slip.invoiceNumber, pageW - margin, y + 66, { align: 'right' });
  }

  y += 90;

  // Calculate delivery block dimensions dynamically to avoid clipping or overflow
  const clientHeading = 'Deliver To:';
  const clientNameText = slip.clientName + (slip.clientCompany ? ' - ' + slip.clientCompany : '');
  const cNameLines = doc.splitTextToSize(clientNameText, pageW - margin * 2 - 24);
  
  let cAddrLines = [];
  if (slip.clientAddress) {
    cAddrLines = doc.splitTextToSize(slip.clientAddress, pageW - margin * 2 - 24);
  }

  // Height calculation for the shaded background box:
  // Title padding (20) + clientName text (cNameLines.length * 13) + padding (4) + address lines (cAddrLines.length * 13) + phone height (13 if exists) + margin-bottom (15)
  let boxHeight = 22 + (cNameLines.length * 13) + 4 + (cAddrLines.length * 13) + (slip.clientPhone ? 13 : 0) + 15;
  if (boxHeight < 70) boxHeight = 70; // Minimum block size

  // Draw background panel for Delivery Card
  doc.setFillColor(248, 250, 252); // slate-50 background color
  doc.rect(margin, y, pageW - margin * 2, boxHeight, 'F');
  
  // Draw left border accent line
  doc.setFillColor(245, 158, 11); // amber-500 brand accent highlight
  doc.rect(margin, y, 4, boxHeight, 'F');

  // Print Delivery details
  doc.setFont('Helvetica', 'bold');
  doc.setFontSize(10);
  doc.setTextColor(30, 58, 95); // primary slate brand
  doc.text(clientHeading, margin + 14, y + 18);
  
  doc.setFont('Helvetica', 'bold');
  doc.setFontSize(9.5);
  doc.setTextColor(15, 23, 42); // slate-900
  
  let cby = y + 33;
  doc.text(cNameLines, margin + 14, cby);
  cby += cNameLines.length * 13;

  doc.setFont('Helvetica', 'normal');
  doc.setFontSize(9.5);
  doc.setTextColor(71, 85, 105); // slate-600
  
  if (cAddrLines.length > 0) {
    doc.text(cAddrLines, margin + 14, cby);
    cby += cAddrLines.length * 13;
  }
  
  if (slip.clientPhone) {
    doc.text('Phone: ' + slip.clientPhone, margin + 14, cby);
  }

  // Shift Y coordinate past the delivery details panel
  y += boxHeight + 25;

  // Process Item Table
  const tableRows = (slip.items || []).map((item, idx) => [idx + 1, item.name, item.quantity]);
  
  doc.autoTable({
    startY: y,
    margin: { left: margin, right: margin },
    head: [['#', 'Product / Item Description', 'Quantity']],
    body: tableRows,
    theme: 'grid',
    headStyles: { 
      fillColor: [15, 31, 58], // brand primary dark
      textColor: [255, 255, 255], 
      fontSize: 10, 
      fontStyle: 'bold', 
      halign: 'left',
      cellPadding: 8 
    },
    bodyStyles: { 
      fontSize: 9.5, 
      textColor: [51, 65, 85], // slate-700
      cellPadding: 7 
    },
    alternateRowStyles: { 
      fillColor: [250, 251, 252] 
    },
    columnStyles: { 
      0: { cellWidth: 35, halign: 'center' },
      1: { cellWidth: 'auto' }, 
      2: { halign: 'center', cellWidth: 70, fontStyle: 'bold' } 
    },
    didParseCell: function(data) {
      if (data.section === 'head' && data.column.index === 2) {
        data.cell.styles.halign = 'center';
      }
    }
  });

  // Calculate final Y position after the autoTable finishes
  let finalY = doc.lastAutoTable.finalY + 25;

  // Print Summary and Totals
  doc.setFont('Helvetica', 'bold');
  doc.setFontSize(10.5);
  doc.setTextColor(15, 23, 42); // slate-900
  
  const totalQtyText = 'Total Quantity: ' + (slip.totalQuantity || slip.items.reduce((a, b) => a + (parseInt(b.quantity, 10) || 0), 0));
  doc.text(totalQtyText, margin, finalY);
  finalY += 20;

  // Print optional notes
  if (slip.notes) {
    doc.setFont('Helvetica', 'bold');
    doc.setFontSize(9.5);
    doc.setTextColor(30, 58, 95); // slate-800
    doc.text('Notes / Delivery Instructions:', margin, finalY);
    
    doc.setFont('Helvetica', 'normal');
    doc.setFontSize(9);
    doc.setTextColor(71, 85, 105); // slate-600
    
    const notesLines = doc.splitTextToSize(slip.notes, pageW - margin * 2);
    doc.text(notesLines, margin, finalY + 14);
    
    finalY += (notesLines.length * 12) + 20;
  }

  // Draw Page Footer (bottom aligned)
  doc.setFont('Helvetica', 'normal');
  doc.setFontSize(8.5);
  doc.setTextColor(148, 163, 184); // slate-400
  
  // Footer rule line
  doc.setDrawColor(226, 232, 240); // slate-200
  doc.setLineWidth(1);
  doc.line(margin, pageH - 50, pageW - margin, pageH - 50);

  doc.text('Thank you for your business!', margin, pageH - 35);
  doc.text('Page 1 of 1', pageW - margin, pageH - 35, { align: 'right' });

  // Download Action
  doc.save('PackingSlip-' + slip.slipCode + '.pdf');
}
</script>
