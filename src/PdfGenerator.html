<script>
/**
 * Packing Slip Software - PDF Generator
 * Renders high-quality PDF downloads using jsPDF and AutoTable
 */

function generatePDF(slip, settings) {
  const { jsPDF } = window.jspdf;
  // A4 Page: 595.28 x 841.89 points
  const doc = new jsPDF('p', 'pt', 'a4');
  const pageW = doc.internal.pageSize.getWidth();
  const pageH = doc.internal.pageSize.getHeight();
  const margin = 45;
  let y = margin;

  // Company logo and details on the left (aligned to margin)
  let textX = margin;
  let maxTextW = 230;
  
  if (settings.LogoBase64) {
    try {
      const props = doc.getImageProperties(settings.LogoBase64);
      const originalW = props.width;
      const originalH = props.height;
      const ratio = originalW / originalH;
      
      const maxW = 90;
      const maxH = 45;
      let logoW = maxW;
      let logoH = logoW / ratio;
      
      if (logoH > maxH) {
        logoH = maxH;
        logoW = logoH * ratio;
      }
      
      // Draw logo image with correct aspect ratio
      doc.addImage(settings.LogoBase64, 'JPEG', margin, y, logoW, logoH);
      textX = margin + logoW + 15; // Dynamic gap based on logo width
      maxTextW = pageW - margin - textX - 150; // Dynamic text width constraint to avoid overlap with right metadata block
      if (maxTextW < 130) maxTextW = 130; // fallback minimum width
    } catch (e) {
      console.warn('PDF Logo drawing failed:', e);
      textX = margin;
      maxTextW = 230;
    }
  }

  const companyName = settings.CompanyName || 'My Company';
  doc.setFont('Helvetica', 'bold');
  doc.setFontSize(14);
  doc.setTextColor(15, 23, 42); // slate-900 (primary theme color)
  
  const compNameLines = doc.splitTextToSize(companyName, maxTextW);
  doc.text(compNameLines, textX, y + 12);
  
  doc.setFont('Helvetica', 'normal');
  doc.setFontSize(9);
  doc.setTextColor(71, 85, 105); // slate-600
  
  let cy = y + 17 + (compNameLines.length * 11);
  if (settings.Address) {
    const addrLines = doc.splitTextToSize(settings.Address, maxTextW);
    doc.text(addrLines, textX, cy);
    cy += addrLines.length * 11.5;
  }
  if (settings.Phone) {
    doc.text('Phone: ' + settings.Phone, textX, cy);
  }

  // Document Title & Metadata on the right
  doc.setFont('Helvetica', 'bold');
  doc.setFontSize(22);
  doc.setTextColor(30, 58, 95); // brand primary color
  const titleText = 'PACKING SLIP';
  const titleWidth = doc.getTextWidth(titleText);
  doc.text(titleText, pageW - margin - titleWidth, y + 20);
  
  doc.setFont('Helvetica', 'normal');
  doc.setFontSize(9.5);
  doc.setTextColor(71, 85, 105); // slate-600
  doc.text('Slip Code: ' + slip.slipCode, pageW - margin, y + 38, { align: 'right' });
  doc.text('Dispatch Date: ' + formatDate(slip.date), pageW - margin, y + 52, { align: 'right' });

  // Build the lines below: Order # / Order Date (when linked) and Invoice # (free-floating).
  // Move further down per added line so labels never collide with the title.
  var linkedOrderIds = (slip.linkedOrders || '').toString().split(',').map(function (s) { return String(s || '').trim(); }).filter(Boolean);
  var invoiceNums = Array.isArray(slip.invoiceNumbers) && slip.invoiceNumbers.length
    ? slip.invoiceNumbers
    : String(slip.invoiceNumber || '').split(',').map(function (s) { return String(s || '').trim(); }).filter(Boolean);
  var orderMetaList = Array.isArray(slip.linkedOrderMeta) ? slip.linkedOrderMeta : [];

  var baseY = y + 66;
  if (linkedOrderIds.length) {
    doc.setFont('Helvetica', 'bold');
    doc.setTextColor(30, 58, 95);
    doc.text('Order #:', pageW - margin - 70, baseY, { align: 'right' });
    doc.setFont('Helvetica', 'normal');
    doc.setTextColor(71, 85, 105);
    doc.text(linkedOrderIds.join(', '), pageW - margin, baseY, { align: 'right' });
    baseY += 14;
  }
  if (orderMetaList.length) {
    var orderDates = orderMetaList.map(function (m) { return m && m.date; }).filter(Boolean);
    if (orderDates.length) {
      orderDates.sort();
      var orderDateText = orderDates.length === 1
        ? formatDate(orderDates[0])
        : (formatDate(orderDates[0]) + ' – ' + formatDate(orderDates[orderDates.length - 1]));
      doc.setFont('Helvetica', 'bold');
      doc.setTextColor(30, 58, 95);
      doc.text('Order Date:', pageW - margin - 70, baseY, { align: 'right' });
      doc.setFont('Helvetica', 'normal');
      doc.setTextColor(71, 85, 105);
      doc.text(orderDateText, pageW - margin, baseY, { align: 'right' });
      baseY += 14;
    }
  }
  if (invoiceNums.length) {
    doc.setFont('Helvetica', 'bold');
    doc.setTextColor(30, 58, 95);
    doc.text('Invoice #:', pageW - margin - 70, baseY, { align: 'right' });
    doc.setFont('Helvetica', 'normal');
    doc.setTextColor(71, 85, 105);
    doc.text(invoiceNums.join(', '), pageW - margin, baseY, { align: 'right' });
    baseY += 14;
  }
  var yShift = (baseY - (y + 66));
  y += (yShift > 0 ? yShift : 0);

  y += 90;

  // Calculate delivery block dimensions dynamically to avoid clipping or overflow
  const clientHeading = 'Deliver To:';
  const clientNameText = slip.clientName + (slip.clientCompany ? ' - ' + slip.clientCompany : '');
  const cNameLines = doc.splitTextToSize(clientNameText, pageW - margin * 2 - 24);
  
  let cAddrLines = [];
  if (slip.clientAddress) {
    cAddrLines = doc.splitTextToSize(slip.clientAddress, pageW - margin * 2 - 24);
  }

  // Height calculation for the shaded background box:
  // Title padding (20) + clientName text (cNameLines.length * 13) + padding (4) + address lines (cAddrLines.length * 13) + phone height (13 if exists) + margin-bottom (15)
  let boxHeight = 22 + (cNameLines.length * 13) + 4 + (cAddrLines.length * 13) + (slip.clientPhone ? 13 : 0) + 15;
  if (boxHeight < 70) boxHeight = 70; // Minimum block size

  // Draw background panel for Delivery Card
  doc.setFillColor(248, 250, 252); // slate-50 background color
  doc.rect(margin, y, pageW - margin * 2, boxHeight, 'F');
  
  // Draw left border accent line
  doc.setFillColor(245, 158, 11); // amber-500 brand accent highlight
  doc.rect(margin, y, 4, boxHeight, 'F');

  // Print Delivery details
  doc.setFont('Helvetica', 'bold');
  doc.setFontSize(10);
  doc.setTextColor(30, 58, 95); // primary slate brand
  doc.text(clientHeading, margin + 14, y + 18);
  
  doc.setFont('Helvetica', 'bold');
  doc.setFontSize(9.5);
  doc.setTextColor(15, 23, 42); // slate-900
  
  let cby = y + 33;
  doc.text(cNameLines, margin + 14, cby);
  cby += cNameLines.length * 13;

  doc.setFont('Helvetica', 'normal');
  doc.setFontSize(9.5);
  doc.setTextColor(71, 85, 105); // slate-600
  
  if (cAddrLines.length > 0) {
    doc.text(cAddrLines, margin + 14, cby);
    cby += cAddrLines.length * 13;
  }
  
  if (slip.clientPhone) {
    doc.text('Phone: ' + slip.clientPhone, margin + 14, cby);
  }

  // Shift Y coordinate past the delivery details panel
  y += boxHeight + 25;

  // Process Item Table. Linked items render "Ordered" alongside "Dispatched"
  // and (when the backend supplies it) a hint of how much is still pending.
  var itemStats = (slip.linkedStats) || {};
  const tableRows = (slip.items || []).map((item, idx) => {
    var stat = itemStats[String(item.name || '').trim()];
    var orderedCell = (stat && stat.ordered) ? String(stat.ordered) : '—';
    var pendingCell = '';
    if (stat && stat.ordered) {
      var pending = Math.max(0, Number(stat.ordered || 0) - (Number(stat.delivered || 0) + Number(item.quantity || 0)));
      pendingCell = pending > 0 ? ' (' + pending + ' pending)' : '';
    }
    var descriptionBlock = item.description ? '\n' + String(item.description) : '';
    var descCell = item.name + descriptionBlock;
    return [idx + 1, descCell, orderedCell, String(item.quantity) + pendingCell];
  });

  doc.autoTable({
    startY: y,
    margin: { left: margin, right: margin },
    head: [['#', 'Product / Item Description', 'Ordered', 'Dispatched']],
    body: tableRows,
    theme: 'grid',
    headStyles: {
      fillColor: [15, 31, 58], // brand primary dark
      textColor: [255, 255, 255],
      fontSize: 10,
      fontStyle: 'bold',
      halign: 'left',
      cellPadding: 8
    },
    bodyStyles: {
      fontSize: 9.5,
      textColor: [51, 65, 85], // slate-700
      cellPadding: 7,
      lineColor: [226, 232, 240],
      lineWidth: 0.4
    },
    alternateRowStyles: {
      fillColor: [250, 251, 252]
    },
    columnStyles: {
      0: { cellWidth: 30, halign: 'center' },
      1: { cellWidth: 'auto' },
      2: { halign: 'center', cellWidth: 70, fontStyle: 'bold' },
      3: { halign: 'center', cellWidth: 80, fontStyle: 'bold' }
    },
    didParseCell: function(data) {
      if (data.section === 'head' && data.column.index === 2) {
        data.cell.styles.halign = 'center';
      }
      if (data.section === 'head' && data.column.index === 3) {
        data.cell.styles.halign = 'center';
      }
      // Render an item description in a smaller, muted font directly under the name.
      if (data.section === 'body' && data.column.index === 1 && data.cell.raw && String(data.cell.raw).indexOf('\n') !== -1) {
        var lines = String(data.cell.raw).split('\n');
        data.cell.text = lines;
      }
    },
    didDrawCell: function(data) {
      // Render description (2nd line) in muted small text underneath the product name.
      if (data.section === 'body' && data.column.index === 1 && data.cell.raw && String(data.cell.raw).indexOf('\n') !== -1) {
        var parts = String(data.cell.raw).split('\n');
        if (parts.length > 1) {
          var nameY = data.cell.y + data.cell.height / 2 - 2;
          doc.setFont('Helvetica', 'bold');
          doc.setFontSize(9.5);
          doc.setTextColor(15, 23, 42);
          doc.text(parts[0], data.cell.x + 4, nameY);
          if (parts[1]) {
            doc.setFont('Helvetica', 'normal');
            doc.setFontSize(8);
            doc.setTextColor(100, 116, 139);
            doc.text(parts[1], data.cell.x + 4, nameY + 11);
          }
        }
      }
    }
    didParseCell: function(data) {
      if (data.section === 'head' && data.column.index === 2) {
        data.cell.styles.halign = 'center';
      }
    }
  });

  // Calculate final Y position after the autoTable finishes
  let finalY = doc.lastAutoTable.finalY + 25;

  // Print Summary and Totals
  doc.setFont('Helvetica', 'bold');
  doc.setFontSize(10.5);
  doc.setTextColor(15, 23, 42); // slate-900

  // Sum "Dispatched" column (this slip only) and "Ordered" column when present.
  let totalDispatched = 0;
  let totalOrdered = 0;
  (slip.items || []).forEach(function (item) {
    totalDispatched += Number(item.quantity || 0);
    var stat = itemStats[String(item.name || '').trim()];
    if (stat && stat.ordered) totalOrdered += Number(stat.ordered || 0);
  });
  const totalQtyText = (totalOrdered > 0
    ? 'Total Ordered: ' + totalOrdered + '   |   Total Dispatched (this slip): ' + totalDispatched
    : 'Total Quantity: ' + totalDispatched);
  doc.text(totalQtyText, margin, finalY);
  finalY += 20;

  // Print optional notes
  if (slip.notes) {
    doc.setFont('Helvetica', 'bold');
    doc.setFontSize(9.5);
    doc.setTextColor(30, 58, 95); // slate-800
    doc.text('Notes / Delivery Instructions:', margin, finalY);

    doc.setFont('Helvetica', 'normal');
    doc.setFontSize(9);
    doc.setTextColor(71, 85, 105); // slate-600

    const notesLines = doc.splitTextToSize(slip.notes, pageW - margin * 2);
    doc.text(notesLines, margin, finalY + 14);

    finalY += (notesLines.length * 12) + 20;
  }

  // Received By signature block.
  finalY += 12;
  if (finalY > pageH - 150) {
    doc.addPage();
    finalY = margin;
  }
  doc.setFont('Helvetica', 'bold');
  doc.setFontSize(11);
  doc.setTextColor(15, 31, 58);
  doc.text('Received By', margin, finalY);
  finalY += 16;
  doc.setDrawColor(148, 163, 184);
  doc.setLineWidth(0.6);

  var labelWidth = 90;
  function drawSignatureLine(label, yPos, lineWidth) {
    doc.setFont('Helvetica', 'bold');
    doc.setFontSize(9);
    doc.setTextColor(30, 58, 95);
    doc.text(label, margin, yPos);
    doc.setFont('Helvetica', 'normal');
    doc.setFontSize(10);
    doc.setTextColor(15, 23, 42);
    doc.line(margin + labelWidth, yPos + 2, margin + labelWidth + lineWidth, yPos + 2);
  }
  drawSignatureLine('Name (Print):', finalY, pageW - margin * 2 - labelWidth);
  finalY += 28;
  drawSignatureLine('Date:', finalY, 120);
  finalY += 28;
  drawSignatureLine('Signature:', finalY, pageW - margin * 2 - labelWidth);
  finalY += 36;

  // Draw Page Footer (bottom aligned)
  doc.setFont('Helvetica', 'normal');
  doc.setFontSize(8.5);
  doc.setTextColor(148, 163, 184); // slate-400
  
  // Footer rule line
  doc.setDrawColor(226, 232, 240); // slate-200
  doc.setLineWidth(1);
  doc.line(margin, pageH - 50, pageW - margin, pageH - 50);

  doc.text('Thank you for your business!', margin, pageH - 35);
  doc.text('Page 1 of 1', pageW - margin, pageH - 35, { align: 'right' });

  // Download Action
  doc.save('PackingSlip-' + slip.slipCode + '.pdf');
}

/**
 * Async wrapper that fetches ordered-vs-dispatched stats + linked-order
 * metadata, then renders the PDF. Existing call sites pass a slip that may
 * not yet carry `linkedStats` / `linkedOrderMeta`, so we lazy-load them.
 */
function generatePDFFromSlip(slip, settings) {
  var linkedIds = (slip && slip.linkedOrders ? String(slip.linkedOrders || '') : '')
    .split(',').map(function (s) { return String(s || '').trim(); }).filter(Boolean);
  if (!linkedIds.length || !slip.clientId) {
    generatePDF(slip, settings);
    return;
  }
  var pending = 2;
  var stats = slip.linkedStats || {};
  var orderMeta = slip.linkedOrderMeta || [];
  function maybeRun() {
    if (--pending === 0) {
      var augmented = Object.assign({}, slip, { linkedStats: stats, linkedOrderMeta: orderMeta });
      generatePDF(augmented, settings);
    }
  }
  google.script.run
    .withSuccessHandler(function (s) { stats = s || {}; maybeRun(); })
    .withFailureHandler(function () { maybeRun(); })
    .getLinkedDeliveryStats(slip.clientId, linkedIds, slip.slipCode);
  google.script.run
    .withSuccessHandler(function (m) { orderMeta = m || []; maybeRun(); })
    .withFailureHandler(function () { maybeRun(); })
    .getLinkedOrderMetadata(linkedIds);
}
</script>
