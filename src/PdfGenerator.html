<script>
/**
 * Packing Slip Software - PDF Generator
 * Renders high-quality PDF downloads using jsPDF and AutoTable
 */

function generatePDF(slip, settings) {
  const { jsPDF } = window.jspdf;
  // A4 Page: 595.28 x 841.89 points
  const doc = new jsPDF('p', 'pt', 'a4');
  const pageW = doc.internal.pageSize.getWidth();
  const pageH = doc.internal.pageSize.getHeight();
  const margin = 45;
  let y = margin;

  // Company logo and details on the left (aligned to margin)
  let textX = margin;
  let maxTextW = 230;
  
  if (settings.LogoBase64) {
    try {
      const props = doc.getImageProperties(settings.LogoBase64);
      const originalW = props.width;
      const originalH = props.height;
      const ratio = originalW / originalH;
      
      const maxW = 90;
      const maxH = 45;
      let logoW = maxW;
      let logoH = logoW / ratio;
      
      if (logoH > maxH) {
        logoH = maxH;
        logoW = logoH * ratio;
      }
      
      // Draw logo image with correct aspect ratio
      doc.addImage(settings.LogoBase64, 'JPEG', margin, y, logoW, logoH);
      textX = margin + logoW + 15; // Dynamic gap based on logo width
      maxTextW = pageW - margin - textX - 150; // Dynamic text width constraint to avoid overlap with right metadata block
      if (maxTextW < 130) maxTextW = 130; // fallback minimum width
    } catch (e) {
      console.warn('PDF Logo drawing failed:', e);
      textX = margin;
      maxTextW = 230;
    }
  }

  const companyName = settings.CompanyName || 'My Company';
  doc.setFont('Helvetica', 'bold');
  doc.setFontSize(14);
  doc.setTextColor(15, 23, 42); // slate-900 (primary theme color)
  
  const compNameLines = doc.splitTextToSize(companyName, maxTextW);
  doc.text(compNameLines, textX, y + 12);
  
  doc.setFont('Helvetica', 'normal');
  doc.setFontSize(9);
  doc.setTextColor(71, 85, 105); // slate-600
  
  let cy = y + 17 + (compNameLines.length * 11);
  if (settings.Address) {
    const addrLines = doc.splitTextToSize(settings.Address, maxTextW);
    doc.text(addrLines, textX, cy);
    cy += addrLines.length * 11.5;
  }
  if (settings.Phone) {
    doc.text('Phone: ' + settings.Phone, textX, cy);
  }

  // Document Title & Metadata on the right
  doc.setFont('Helvetica', 'bold');
  doc.setFontSize(22);
  doc.setTextColor(30, 58, 95); // brand primary color
  const titleText = 'PACKING SLIP';
  const titleWidth = doc.getTextWidth(titleText);
  doc.text(titleText, pageW - margin - titleWidth, y + 20);
  
  doc.setFont('Helvetica', 'normal');
  doc.setFontSize(9.5);
  doc.setTextColor(71, 85, 105); // slate-600
  // Slip Code + Dispatch Date are rendered below by drawMetaRow so the layout
  // can adapt to long values via line wrapping; do not draw them here too or
  // they will collide with the row below.

  // Build the lines below: Order # / Order Date (when linked) and Invoice # (free-floating).
  // Move further down per added line so labels never collide with the title.
  var linkedOrderIds = (slip.linkedOrders || '').toString().split(',').map(function (s) { return String(s || '').trim(); }).filter(Boolean);
  var invoiceNums = Array.isArray(slip.invoiceNumbers) && slip.invoiceNumbers.length
    ? slip.invoiceNumbers
    : String(slip.invoiceNumber || '').split(',').map(function (s) { return String(s || '').trim(); }).filter(Boolean);
  var orderMetaList = Array.isArray(slip.linkedOrderMeta) ? slip.linkedOrderMeta : [];

  var baseY = y + 66;

  // Right-side metadata layout: labels right-aligned ending at labelEndX;
  // values left-aligned starting at valueStartX, wrapping with splitTextToSize.
  // This guarantees labels and values never overlap.
  var labelEndX = pageW - margin - 105;      // right edge of the label text
  var valueStartX = labelEndX + 8;            // left edge of the value text
  var valueMaxWidth = pageW - margin - valueStartX; // space to wrap values (about 97pt)

  function drawMetaRow(label, valueText, opts) {
    if (!valueText) return;
    var text = String(valueText);
    if (!text.trim()) return;
    doc.setFont('Helvetica', 'bold');
    doc.setTextColor(30, 58, 95);
    doc.text(label + ':', labelEndX, baseY, { align: 'right' });
    doc.setFont('Helvetica', 'normal');
    doc.setTextColor(71, 85, 105);
    var lines = doc.splitTextToSize(text, valueMaxWidth);
    doc.text(lines, valueStartX, baseY);
    // Grow baseY per actual line so the row never overlaps the next row.
    baseY += Math.max(14, 14 * lines.length);
    if (opts && opts.interRow) baseY += opts.interRow;
  }

  drawMetaRow('Slip Code', slip.slipCode);
  drawMetaRow('Dispatch Date', formatDate(slip.date));
  if (linkedOrderIds.length) {
    drawMetaRow('Order #', linkedOrderIds.join(', '));
  }
  if (orderMetaList.length) {
    var orderDates = orderMetaList.map(function (m) { return m && m.date; }).filter(Boolean);
    if (orderDates.length) {
      orderDates.sort();
      var orderDateText = orderDates.length === 1
        ? formatDate(orderDates[0])
        : (formatDate(orderDates[0]) + ' – ' + formatDate(orderDates[orderDates.length - 1]));
      drawMetaRow('Order Date', orderDateText);
    }
  }
  if (invoiceNums.length) {
    drawMetaRow('Invoice #', invoiceNums.join(', '));
  }
  var yShift = (baseY - (y + 66));
  y += (yShift > 0 ? yShift : 0);

  y += 90;

  // Calculate delivery block dimensions dynamically to avoid clipping or overflow
  const clientHeading = 'Deliver To:';
  const clientNameText = slip.clientName + (slip.clientCompany ? ' - ' + slip.clientCompany : '');
  const cNameLines = doc.splitTextToSize(clientNameText, pageW - margin * 2 - 24);
  
  let cAddrLines = [];
  if (slip.clientAddress) {
    cAddrLines = doc.splitTextToSize(slip.clientAddress, pageW - margin * 2 - 24);
  }

  // Height calculation for the shaded background box:
  // Title padding (20) + clientName text (cNameLines.length * 13) + padding (4) + address lines (cAddrLines.length * 13) + phone height (13 if exists) + margin-bottom (15)
  let boxHeight = 22 + (cNameLines.length * 13) + 4 + (cAddrLines.length * 13) + (slip.clientPhone ? 13 : 0) + 15;
  if (boxHeight < 70) boxHeight = 70; // Minimum block size

  // Draw background panel for Delivery Card
  doc.setFillColor(248, 250, 252); // slate-50 background color
  doc.rect(margin, y, pageW - margin * 2, boxHeight, 'F');
  
  // Draw left border accent line
  doc.setFillColor(245, 158, 11); // amber-500 brand accent highlight
  doc.rect(margin, y, 4, boxHeight, 'F');

  // Print Delivery details
  doc.setFont('Helvetica', 'bold');
  doc.setFontSize(10);
  doc.setTextColor(30, 58, 95); // primary slate brand
  doc.text(clientHeading, margin + 14, y + 18);
  
  doc.setFont('Helvetica', 'bold');
  doc.setFontSize(9.5);
  doc.setTextColor(15, 23, 42); // slate-900
  
  let cby = y + 33;
  doc.text(cNameLines, margin + 14, cby);
  cby += cNameLines.length * 13;

  doc.setFont('Helvetica', 'normal');
  doc.setFontSize(9.5);
  doc.setTextColor(71, 85, 105); // slate-600
  
  if (cAddrLines.length > 0) {
    doc.text(cAddrLines, margin + 14, cby);
    cby += cAddrLines.length * 13;
  }
  
  if (slip.clientPhone) {
    doc.text('Phone: ' + slip.clientPhone, margin + 14, cby);
  }

  // Shift Y coordinate past the delivery details panel
  y += boxHeight + 25;

  // Process Item Table. Linked items render "Ordered" alongside "Dispatched"
  // and (when the backend supplies it) a hint of how much is still pending.
  var itemStats = (slip.linkedStats) || {};
  const tableRows = (slip.items || []).map((item, idx) => {
    var stat = itemStats[String(item.name || '').trim()] || {};
    var orderedQty = stat.ordered ? String(stat.ordered) : '—';
    var prevDispatched = stat.delivered ? String(stat.delivered) : '—';
    var thisDispatched = String(item.quantity || 0);
    return [
      idx + 1,
      String(item.name || ''),
      String(item.description || ''),
      orderedQty,
      prevDispatched,
      thisDispatched
    ];
  });

  doc.autoTable({
    startY: y,
    margin: { left: margin, right: margin },
    head: [[
      '#',
      'Product Name',
      'Packing Description',
      'Ordered',
      'Previously Dispatched',
      'Dispatched (This Slip)'
    ]],
    body: tableRows,
    theme: 'grid',
    headStyles: {
      fillColor: [15, 31, 58], // brand primary dark
      textColor: [255, 255, 255],
      fontSize: 9.5,
      fontStyle: 'bold',
      halign: 'left',
      cellPadding: 6
    },
    bodyStyles: {
      fontSize: 9.5,
      textColor: [51, 65, 85], // slate-700
      cellPadding: 6,
      lineColor: [226, 232, 240],
      lineWidth: 0.4
    },
    alternateRowStyles: {
      fillColor: [250, 251, 252]
    },
    columnStyles: {
      0: { cellWidth: 26, halign: 'center' },
      1: { cellWidth: 'auto', halign: 'left' },
      2: { cellWidth: 130, halign: 'left' },
      3: { halign: 'center', cellWidth: 56, fontStyle: 'bold' },
      4: { halign: 'center', cellWidth: 80, fontStyle: 'bold' },
      5: { halign: 'center', cellWidth: 80, fontStyle: 'bold' }
    },
    didParseCell: function(data) {
      // Header rows: center all amount-style columns (# and the three
      // numeric columns to its right).
      if (data.section === 'head' && data.column.index >= 3) {
        data.cell.styles.halign = 'center';
      }
      if (data.section === 'body') {
        if (data.column.index === 0) {
          // # column: muted centered
          data.cell.styles.halign = 'center';
          data.cell.styles.textColor = [100, 116, 139];
          data.cell.styles.fontStyle = 'normal';
        }
        if (data.column.index === 1) {
          // Product Name: bold, dark slate
          data.cell.styles.fontStyle = 'bold';
          data.cell.styles.textColor = [15, 23, 42];
        }
        if (data.column.index === 2) {
          // Description: small muted font
          data.cell.styles.fontSize = 8.5;
          data.cell.styles.textColor = [100, 116, 139];
          data.cell.styles.fontStyle = 'normal';
        }
        if (data.column.index >= 3) {
          // Amount columns: centered + bold; muted dash when no link mapping
          data.cell.styles.halign = 'center';
          data.cell.styles.fontStyle = 'bold';
          if (data.cell.raw === '—' || data.cell.raw === '') {
            data.cell.styles.textColor = [148, 163, 184];
            data.cell.styles.fontStyle = 'normal';
          }
        }
      }
    }
  });

  // Calculate final Y position after the autoTable finishes
  let finalY = doc.lastAutoTable.finalY + 25;

  // Print Summary and Totals
  doc.setFont('Helvetica', 'bold');
  doc.setFontSize(10.5);
  doc.setTextColor(15, 23, 42); // slate-900

  // Sum dispatched (this slip) and the linked shipped counts so the totals
  // line matches the new 3 amount columns.
  let totalDispatched = 0;
  let totalOrdered = 0;
  let totalPreviouslyDispatched = 0;
  (slip.items || []).forEach(function (item) {
    totalDispatched += Number(item.quantity || 0);
    var stat = itemStats[String(item.name || '').trim()];
    if (stat && stat.ordered) totalOrdered += Number(stat.ordered || 0);
    if (stat && stat.delivered) totalPreviouslyDispatched += Number(stat.delivered || 0);
  });

  // Compose totals in a fixed order so the line reads naturally regardless
  // of how many pieces are populated.
  const totalsPrefix = [];
  if (totalOrdered > 0) totalsPrefix.push('Total Ordered: ' + totalOrdered);
  if (totalPreviouslyDispatched > 0) totalsPrefix.push('Previously Dispatched: ' + totalPreviouslyDispatched);
  totalsPrefix.push('Dispatched (This Slip): ' + totalDispatched);
  const totalQtyText = totalsPrefix.join('   |   ');
  doc.text(totalQtyText, margin, finalY);
  finalY += 20;

  // Print optional notes
  if (slip.notes) {
    doc.setFont('Helvetica', 'bold');
    doc.setFontSize(9.5);
    doc.setTextColor(30, 58, 95); // slate-800
    doc.text('Notes / Delivery Instructions:', margin, finalY);

    doc.setFont('Helvetica', 'normal');
    doc.setFontSize(9);
    doc.setTextColor(71, 85, 105); // slate-600

    const notesLines = doc.splitTextToSize(slip.notes, pageW - margin * 2);
    doc.text(notesLines, margin, finalY + 14);

    finalY += (notesLines.length * 12) + 20;
  }

  // Received By signature block.
  finalY += 12;
  if (finalY > pageH - 150) {
    doc.addPage();
    finalY = margin;
  }
  doc.setFont('Helvetica', 'bold');
  doc.setFontSize(11);
  doc.setTextColor(15, 31, 58);
  doc.text('Received By', margin, finalY);
  finalY += 16;
  doc.setDrawColor(148, 163, 184);
  doc.setLineWidth(0.6);

  var labelWidth = 90;
  function drawSignatureLine(label, yPos, lineWidth) {
    doc.setFont('Helvetica', 'bold');
    doc.setFontSize(9);
    doc.setTextColor(30, 58, 95);
    doc.text(label, margin, yPos);
    doc.setFont('Helvetica', 'normal');
    doc.setFontSize(10);
    doc.setTextColor(15, 23, 42);
    doc.line(margin + labelWidth, yPos + 2, margin + labelWidth + lineWidth, yPos + 2);
  }
  drawSignatureLine('Name (Print):', finalY, pageW - margin * 2 - labelWidth);
  finalY += 28;
  drawSignatureLine('Date:', finalY, 120);
  finalY += 28;
  drawSignatureLine('Signature:', finalY, pageW - margin * 2 - labelWidth);
  finalY += 36;

  // Draw Page Footer (bottom aligned)
  doc.setFont('Helvetica', 'normal');
  doc.setFontSize(8.5);
  doc.setTextColor(148, 163, 184); // slate-400
  
  // Footer rule line
  doc.setDrawColor(226, 232, 240); // slate-200
  doc.setLineWidth(1);
  doc.line(margin, pageH - 50, pageW - margin, pageH - 50);

  doc.text('Thank you for your business!', margin, pageH - 35);
  doc.text('Page 1 of 1', pageW - margin, pageH - 35, { align: 'right' });

  // Download Action
  doc.save('PackingSlip-' + slip.slipCode + '.pdf');
}

/**
 * Async wrapper that fetches enriched stats + linked-order metadata in a
 * single round trip via getSlipPDFEnrichment, then renders the PDF. The
 * optional `onRendered` callback fires after PDF generation (or on failure)
 * so callers can re-enable a busy-state button. Existing call sites pass a
 * slip that may already carry `linkedStats` / `linkedOrderMeta`, in which
 * case we skip the server round trip and render immediately.
 */
function generatePDFFromSlip(slip, settings, onRendered) {
  function done() {
    // Always hide the page-wide loading overlay once PDF generation ends,
    // regardless of success or failure.
    if (typeof hidePdfLoading === 'function') {
      try { hidePdfLoading(); } catch (e) {}
    }
    if (typeof onRendered === 'function') {
      try { onRendered(); } catch (e) { /* swallow restore errors */ }
    }
  }
  function renderWith(enrich) {
    enrich = enrich || {};
    var augmented = Object.assign({}, slip, {
      linkedStats: enrich.stats || {},
      linkedOrderMeta: enrich.orderMeta || []
    });
    try { generatePDF(augmented, settings); } finally { done(); }
  }

  // Always surface a visible loading indicator while we wait on either the
  // server round trip + render path or the synchronous render path. The
  // overlay auto-hides via `done()` regardless of branch.
  if (typeof showPdfLoading === 'function') {
    try { showPdfLoading(); } catch (e) {}
  }

  var linkedIds = (slip && slip.linkedOrders ? String(slip.linkedOrders || '') : '')
    .split(',').map(function (s) { return String(s || '').trim(); }).filter(Boolean);
  if (!linkedIds.length || !slip.clientId) {
    // Not linked to any order: render straight away, no enrichment needed.
    try { generatePDF(slip, settings); } finally { done(); }
    return;
  }
  google.script.run
    .withSuccessHandler(renderWith)
    .withFailureHandler(function (err) {
      // Best-effort render with whatever enrichment the client already has,
      // so the user still gets a PDF even if the server round trip failed.
      try {
        generatePDF(slip, settings);
      } catch (renderErr) {
        // Surface to caller if they want to handle; for safety also log.
        try { console.warn('PDF render after enrichment failure failed:', renderErr); } catch (e) {}
      } finally {
        done();
      }
    })
    .getSlipPDFEnrichment(slip);
}
</script>
